// ── Alle Mannschaften – Sort-State ──────────────────────────────
let _tSort={key:'name',asc:true};

function computeWm26(){
  const ld=(typeof WM_FINALS_DATA!=='undefined')?WM_FINALS_DATA:{};
  const tr={};
  for(const rnd of ['r32','r16','qf','sf','f']){
    for(const slot of (ld[rnd]||[])){
      if(!slot) continue;
      for(const tk of ['t1','t2']){
        const t=(slot[tk]||'').trim();
        if(t&&!/^\d+\.\s/.test(t)&&!/^Sieger\s/i.test(t)&&!/^Gew\.\s/i.test(t))
          tr[t]=rnd;
      }
    }
  }
  let champion='';
  const fin=ld['f']&&ld['f'][0];
  if(fin&&fin.r){
    const p=fin.r.split(':');
    if(p.length>=2){const g1=parseInt(p[0]),g2=parseInt(p[1]);if(g1>g2)champion=fin.t1;else if(g2>g1)champion=fin.t2;}
  }
  const lbl={r32:'1/16',r16:'1/8',qf:'1/4',sf:'Halbfinale',f:'Finale'};
  const out={};
  for(const[t,rnd]of Object.entries(tr))
    out[t]=(t===champion)?'🏆 Weltmeister':lbl[rnd];
  return out;
}

function sortTeamsTable(key){
  if(_tSort.key===key) _tSort.asc=!_tSort.asc;
  else { _tSort={key,asc:true}; }
  _renderTeamsTbody();
  // Update sort arrows in headers
  document.querySelectorAll('#teams-all-table th[data-col]').forEach(th=>{
    const arrow=th.querySelector('.sort-arrow');
    if(arrow) arrow.textContent=(th.dataset.col===_tSort.key)?(_tSort.asc?' ↑':' ↓'):'';
  });
}

function _renderTeamsTbody(){
  const tbody=document.getElementById('teams-all-tbody');
  if(!tbody) return;
  const wm26=computeWm26();
  const wm26ord={'Gruppe':0,'1/16':1,'1/8':2,'1/4':3,'Halbfinale':4,'Finale':5,'🏆 Weltmeister':6};
  const confColor={'UEFA':'#1a5fa8','CONMEBOL':'#1a9a60','CONCACAF':'#c07010','CAF':'#b83010','AFC':'#7a40a0','OFC':'#2a8080'};
  const teams=Object.keys(WM_TEAM_INFO).sort((a,b)=>{
    const ia=WM_TEAM_INFO[a]||{},ib=WM_TEAM_INFO[b]||{};
    let c=0;
    if(_tSort.key==='name') c=a.localeCompare(b,'de');
    else if(_tSort.key==='conf') c=(WM_TEAM_CONF[a]||'').localeCompare(WM_TEAM_CONF[b]||'');
    else if(_tSort.key==='fifa') c=((ia.fifa||99)-(ib.fifa||99));
    else if(_tSort.key==='mv') c=((ib.mv||0)-(ia.mv||0));
    else if(_tSort.key==='wm26') c=((wm26ord[wm26[b]||'Gruppe']||0)-(wm26ord[wm26[a]||'Gruppe']||0));
    return _tSort.asc?c:-c;
  });
  tbody.innerHTML=teams.map(t=>{
    const info=WM_TEAM_INFO[t]||{};
    const flag=WM_FLAGS[t]||'';
    const conf=WM_TEAM_CONF[t]||'';
    const cCol=confColor[conf]||'#888';
    const fifaStr=info.fifa?`${info.fifa}.`:'–';
    const mvStr=info.mv?(info.mv>=1000?`${(info.mv/1000).toFixed(1).replace('.',',')} Mrd €`:`${info.mv} M €`):'–';
    const stage=wm26[t]||'Gruppe';
    const stageCol=stage==='🏆 Weltmeister'?'#b07800':stage==='Finale'?'#555':stage==='Gruppe'?'#999':'#1a8040';
    return `<tr>
      <td style="padding:2px 4px;white-space:nowrap;color:#1c1c1e">${flag} ${t}</td>
      <td style="padding:2px 4px;white-space:nowrap;color:${cCol};font-size:8px;font-weight:bold">${conf}</td>
      <td style="padding:2px 4px;text-align:center;color:#555">${fifaStr}</td>
      <td style="padding:2px 4px;text-align:right;color:#555;white-space:nowrap">${mvStr}</td>
      <td style="padding:2px 4px;text-align:center;color:${stageCol};font-weight:bold;white-space:nowrap">${stage}</td>
    </tr>`;
  }).join('');
}

function renderFinalspiele(){
  const el=document.getElementById('gruppe-kader');
  if(!el) return;
  const U=42, CH=36;
  const CW=[138,125,120,112,110];
  const XS=[0,156,299,437,567];
  const H=16*U;
  const SVGW=XS[4]+CW[4];
  const roundKeys=['r32','r16','qf','sf','f'];
  const rounds=[WM_FINAL.r32,WM_FINAL.r16,WM_FINAL.qf,WM_FINAL.sf,WM_FINAL.f];
  const rnames=['Sechzehntelfinale','Achtelfinale','Viertelfinale','Halbfinale','Finale'];
  const cys=[
    rounds[0].map((_,i)=>(i+.5)*U),
    rounds[1].map((_,i)=>(2*i+1)*U),
    rounds[2].map((_,i)=>(4*i+2)*U),
    rounds[3].map((_,i)=>(8*i+4)*U),
    [8*U],
  ];
  const liveData=(typeof WM_FINALS_DATA!=='undefined')?WM_FINALS_DATA:{};

  // Platzhalter-Namen erkennen ("3. A/B/C/D/F", "1. I", "Sieger ...", "Gew. ...")
  function isPlaceholder(t){
    if(!t) return true;
    return /^\d+\.\s+[A-L\/]+$/.test(t) ||   // "1. I", "3. A/B/C/D/F"
           /^Sieger\s/i.test(t) ||              // "Sieger Sechzehntelfinal 3"
           /^Gew\.\s/i.test(t);                 // "Gew. Dallas"
  }
  // Gibt den bereinigten Teamnamen zurück (Emoji behalten, Platzhalter → '')
  function cleanTeam(t){
    if(isPlaceholder(t)) return '';
    return t;
  }

  let svg='';
  for(let r=0;r<4;r++){
    const xR=XS[r]+CW[r],xM=xR+8,xN=XS[r+1];
    for(let i=0;i<rounds[r+1].length;i++){
      const y1=cys[r][2*i],y2=cys[r][2*i+1],ym=(y1+y2)/2;
      svg+=`<polyline points="${xR},${y1} ${xM},${y1} ${xM},${y2} ${xR},${y2}" fill="none" stroke="#b0b0b0" stroke-width="1"/>`;
      svg+=`<line x1="${xM}" y1="${ym}" x2="${xN}" y2="${ym}" stroke="#b0b0b0" stroke-width="1"/>`;
    }
  }
  const FLAGS=WM_FLAGS;

  let cards='';
  for(let r=0;r<5;r++){
    const x=XS[r],w=CW[r],rkey=roundKeys[r];
    const bdr=r===4?'#c8a820':r===3?'#0a6040':r===2?'#0a5060':'#4a6a9a';
    const tCol=r===4?'#8a6600':r>=2?'#0a6a50':'#2a2a2a';
    const fSize=r===4?10:9;
    for(let i=0;i<rounds[r].length;i++){
      const m=rounds[r][i];
      const live=(liveData[rkey]&&liveData[rkey][i])||null;
      const rawT1=live?live.t1:m.t1;
      const rawT2=live?live.t2:m.t2;
      const t1=cleanTeam(rawT1)||(isPlaceholder(m.t1)?'':m.t1)||'';
      const t2=cleanTeam(rawT2)||(isPlaceholder(m.t2)?'':m.t2)||'';
      const res=live&&live.r?live.r:'';
      const f1=FLAGS[t1]?FLAGS[t1]+' ':'';
      const f2=FLAGS[t2]?FLAGS[t2]+' ':'';
      const top=Math.round(cys[r][i]-CH/2)+28;
      cards+=`<div style="position:absolute;left:${x}px;top:${top}px;width:${w}px;background:#ffffff;border:1px solid ${bdr};border-radius:3px;padding:2px 4px;box-sizing:border-box;font-size:${fSize}px">`+
        `<div style="color:#000;font-size:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px">${(live&&live.d?live.d:m.d)}${(live&&live.h?(' '+live.h):(m.h?' '+m.h:''))} · ${m.o}</div>`+
        `<div style="display:flex;align-items:center;gap:3px">`+
          `<div style="flex:1;min-width:0">`+
            `<div style="color:${t1?tCol:'#3a5a6a'};padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:${t1?'normal':'italic'}${r===0&&t1?';cursor:pointer;text-decoration:underline dotted':''}" ${r===0&&t1?`onmouseenter="showTeamPopup('${t1.replace(/'/g,"\\'")}',event)" onmouseleave="hideTeamPopup()" onclick="openTeamGroup('${t1.replace(/'/g,"\\'")}')"`:''} title="${r===0&&t1?'Hover: Gruppe & Kader | Klick: Tab öffnen':''}">${f1}${t1||'wird ermittelt'}</div>`+
            `<div style="color:${t2?tCol:'#3a5a6a'};padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:${t2?'normal':'italic'}${r===0&&t2?';cursor:pointer;text-decoration:underline dotted':''}" ${r===0&&t2?`onmouseenter="showTeamPopup('${t2.replace(/'/g,"\\'")}',event)" onmouseleave="hideTeamPopup()" onclick="openTeamGroup('${t2.replace(/'/g,"\\'")}')"`:''} title="${r===0&&t2?'Hover: Gruppe & Kader | Klick: Tab öffnen':''}">${f2}${t2||'wird ermittelt'}</div>`+
          `</div>`+
          (res?`<div style="color:#000;font-size:${fSize}px;flex-shrink:0;font-weight:bold">${res}</div>`:'')+
        `</div>`+
        `</div>`;
    }
  }
  let hdrs='';
  for(let r=0;r<5;r++){
    hdrs+=`<div style="position:absolute;left:${XS[r]}px;width:${CW[r]}px;top:4px;text-align:center;font-size:7.5px;font-weight:bold;color:#1a4a5a;letter-spacing:.6px;text-transform:uppercase">${rnames[r]}</div>`;
  }
  // Resultate-Tabelle: alle Spiele nach Datum sortiert
  const allGames=[];
  for(let r=0;r<5;r++){
    for(let i=0;i<rounds[r].length;i++){
      const m=rounds[r][i]; if(!m) continue;
      const live=(liveData[roundKeys[r]]&&liveData[roundKeys[r]][i])||null;
      const t1=cleanTeam(live?live.t1:m.t1)||(isPlaceholder(m.t1)?'':m.t1)||'';
      const t2=cleanTeam(live?live.t2:m.t2)||(isPlaceholder(m.t2)?'':m.t2)||'';
      const res=(live&&live.r)?live.r:'';
      const lh=(live&&live.h)?live.h:(m.h||'');
      const ld=(live&&live.d)?live.d:m.d||'';
      if(t1||t2) allGames.push({d:ld,h:lh,t1,t2,res,round:rnames[r]});
    }
  }
  function dateKey(d){
    if(!d) return 99999;
    const m=d.match(/(\d{2})\.(\d{2})/);
    return m ? parseInt(m[2])*100+parseInt(m[1]) : 99999; // MMDD
  }
  function timeKey(h){ if(!h) return 9999; const p=h.split(':'); return parseInt(p[0]||0)*100+parseInt(p[1]||0); }
  allGames.sort((a,b)=>{
    const dk=dateKey(a.d)-dateKey(b.d);
    if(dk!==0) return dk;
    return timeKey(a.h)-timeKey(b.h);
  });
  const tblRows=allGames.map(g=>{
    const f1=FLAGS[g.t1]?FLAGS[g.t1]+' ':'';
    const f2=FLAGS[g.t2]?FLAGS[g.t2]+' ':'';
    const resTd=g.res
      ?'<td style="text-align:center;color:#000;font-weight:bold;padding:2px 5px;white-space:nowrap">'+g.res+'</td>'
      :'<td style="text-align:center;color:#444;padding:2px 5px">–</td>';
    function mkTd(t,f){
      if(!t) return '<td style="padding:2px 4px;white-space:nowrap;color:#555">'+f+'offen</td>';
      const esc=t.replace(/'/g,"\'");
      return '<td style="padding:2px 4px;white-space:nowrap;color:#3a3a3c;cursor:pointer;text-decoration:underline dotted"'+
        ' onmouseenter="showTeamPopup(\'' +esc+ '\',event)"'+
        ' onmouseleave="hideTeamPopup()"'+
        ' onclick="openTeamGroup(\'' +esc+ '\')">'
        +f+t+'</td>';
    }
    const dateTd='<td style="color:#555;font-size:9px;padding:2px 5px;white-space:nowrap">'+(g.d||'')+(g.h?' · '+g.h:'')+'</td>';
    return '<tr>'+dateTd+mkTd(g.t1,f1)+resTd+mkTd(g.t2,f2)+'</tr>';
  }).join('');
  const gameTable=`<div style="flex-shrink:0;min-width:240px">
    <div style="font-size:8px;font-weight:bold;color:#1a4a5a;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">Alle Spiele</div>
    <table style="border-collapse:collapse;font-size:9px;width:100%">
      <thead><tr>
        <th style="text-align:left;color:#556;padding:2px 5px;border-bottom:1px solid #d1d1d6">Datum / Zeit (MEZ)</th>
        <th style="text-align:left;color:#556;padding:2px 4px;border-bottom:1px solid #d1d1d6">Team 1</th>
        <th style="text-align:center;color:#556;padding:2px 5px;border-bottom:1px solid #d1d1d6">Res.</th>
        <th style="text-align:left;color:#556;padding:2px 4px;border-bottom:1px solid #d1d1d6">Team 2</th>
      </tr></thead>
      <tbody>${tblRows}</tbody>
    </table>
  </div>`;

  // ── Alle 48 Mannschaften (sortierbar) ────────────────────────
  const thStyle='cursor:pointer;user-select:none;color:#556;padding:2px 4px;border-bottom:1px solid #d1d1d6;white-space:nowrap';
  const teamsTable=`<div id="teams-all-table" style="flex-shrink:0;min-width:300px">
    <div style="font-size:8px;font-weight:bold;color:#1a4a5a;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">Alle Mannschaften</div>
    <table style="border-collapse:collapse;font-size:9px;width:100%">
      <thead><tr>
        <th data-col="name" onclick="sortTeamsTable('name')" style="${thStyle};text-align:left">Land<span class="sort-arrow"> ↑</span></th>
        <th data-col="conf" onclick="sortTeamsTable('conf')" style="${thStyle};text-align:left">Verband<span class="sort-arrow"></span></th>
        <th data-col="fifa" onclick="sortTeamsTable('fifa')" style="${thStyle};text-align:center">FIFA<span class="sort-arrow"></span></th>
        <th data-col="mv"   onclick="sortTeamsTable('mv')"   style="${thStyle};text-align:right">Marktwert<span class="sort-arrow"></span></th>
        <th data-col="wm26" onclick="sortTeamsTable('wm26')" style="${thStyle};text-align:center">WM 2026<span class="sort-arrow"></span></th>
      </tr></thead>
      <tbody id="teams-all-tbody"></tbody>
    </table>
  </div>`;

  el.innerHTML=`<div style="display:flex;gap:20px;align-items:flex-start;overflow-x:auto;padding:4px 0 12px">` +
    `<div style="position:relative;width:${SVGW}px;height:${H+28}px;flex-shrink:0">`+
      hdrs+
      `<svg width="${SVGW}" height="${H}" style="position:absolute;top:28px;left:0;pointer-events:none">${svg}</svg>`+
      cards+
    `</div>`+
    gameTable+
    teamsTable+
  `</div>`;
  _renderTeamsTbody();
}


// ── Turnier-Wechsler ──────────────────────────────────────────
(function initTurnierSwitcher(){
  const sw = document.getElementById('turnier-switcher');
  if(!sw) return;
  if(typeof TURNIERE === 'undefined' || TURNIERE.length <= 1){
    sw.style.display = 'none';
    return;
  }
  sw.style.display = 'block';
  const sel = document.createElement('select');
  sel.title = 'Turnier wechseln';
  // Neuestes zuerst (umgekehrte Reihenfolge)
  TURNIERE.slice().reverse().forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.datei;
    opt.textContent = t.name;
    if(t.aktiv) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    if(sel.value) window.location.href = sel.value;
  });
  sw.appendChild(sel);
})();
