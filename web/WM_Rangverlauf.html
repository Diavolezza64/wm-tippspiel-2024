  #main { flex: 1; display: flex; flex-direction: column; padding: 10px 12px 8px; min-width: 0; min-height: 0; }

    flex-shrink: 0; transition: border-color 0.2s, color 0.2s; }

<script>
const PALETTE = [
  '#1f77b4','#aec7e8','#ff7f0e','#ffbb78','#2ca02c','#98df8a','#d62728','#ff9896',
  '#9467bd','#c5b0d5','#8c564b','#c49c94','#e377c2','#f7b6d2','#7f7f7f','#c7c7c7',
  '#bcbd22','#dbdb8d','#17becf','#9edae5',
  '#393b79','#5254a3','#6b6ecf','#9c9ede','#637939','#8ca252','#b5cf6b','#cedb9c',
  '#8c6d31','#bd9e39','#e7ba52','#e7cb94'
];

let chart = null, freqChartInstance = null;
let activePlayer = null, data = null, tipData = null;
let _rvFilter = new Set();
let _pvFilter = new Set();
let _showBonus = true;
let currentTab = 'rangliste';
let freqSort = { col: 'tips', dir: -1 };   // -1 = desc
let freqNormalize = false;

// ── Virtual players (FIFA-Tipp, MW-Tipp) ─────────────────────
const VIRT_FIFA = '🌍 FIFA Rang';
const VIRT_MW   = '💰 Markt Wert';
let showFifa = false;
let showMW   = false;
function isVirtHidden(name){ return (name===VIRT_FIFA&&!showFifa)||(name===VIRT_MW&&!showMW); }
const VIRT_COLORS = { [VIRT_FIFA]: '#ffcc00', [VIRT_MW]: '#ff8800' };

function virtTip(gameName, rankMap) {
  // rankMap: lower value = better (FIFA_RANG_DATA and MW_RANG both use this convention)
  const parts = gameName.split(' vs ');
  if (parts.length !== 2) return '1:1';
  const rh = rankMap[parts[0].trim()], ra = rankMap[parts[1].trim()];
  if (!rh || !ra) return '1:1';
  if (Math.abs(rh - ra) <= 3) return '1:1';
  return rh < ra ? '1:0' : '0:1';
}

function stdScoreApprox(tipStr, resultStr) {
  // Approximate standard scoring: 10 exact, 8 same diff, 6 correct tendency, 0 wrong
  // FS games are stored at ×2 in data.points — caller applies multiplier
  if (!tipStr || !resultStr) return 0;
  const t = tipStr.split(':').map(Number), r = resultStr.split(':').map(Number);
  if (t.length !== 2 || r.length !== 2 || t.some(isNaN) || r.some(isNaN)) return 0;
  const tT = Math.sign(t[0]-t[1]), rT = Math.sign(r[0]-r[1]);
  if (t[0]===r[0] && t[1]===r[1]) return 10;
  if (tT===rT && (t[0]-t[1]) === (r[0]-r[1])) return 8;
  if (tT===rT) return 6;
  return 0;
}

function injectVirtualPlayers() {
  if (!data) return;
  // Remove any previously injected virtual players (idempotent)
  [VIRT_FIFA, VIRT_MW].forEach(vname => {
    const idx = data.members.indexOf(vname);
    if (idx !== -1) { data.members.splice(idx,1); data.points.splice(idx,1); data.ranks.splice(idx,1); }
  });
  if (tipData) {
    const clean = tipData.filter(r => r.name !== VIRT_FIFA && r.name !== VIRT_MW);
    tipData.splice(0, tipData.length, ...clean);
  }
  const n = data.gameNums.length;
  // Build cumulative data.points for a virtual player
  function buildCumPts(rankMap) {
    let cum = 0;
    return data.gameNames.map((gn, i) => {
      const tip = virtTip(gn, rankMap);
      const result = (data.gameResults[i] || '').trim();
      const mult = data.gameNums[i] > 72 ? 2 : 1;
      cum += stdScoreApprox(tip, result) * mult;
      return cum;
    });
  }
  // Assign fixed colors at the new player indices
  PALETTE[data.members.length]   = VIRT_COLORS[VIRT_FIFA];
  PALETTE[data.members.length+1] = VIRT_COLORS[VIRT_MW];
  // Inject into data
  [VIRT_FIFA, VIRT_MW].forEach((vname, vi) => {
    const rankMap = vi === 0 ? FIFA_RANG_DATA : MW_RANG;
    data.members.push(vname);
    data.points.push(buildCumPts(rankMap));
    data.ranks.push(new Array(n).fill(0));
  });
  // Inject tip rows into tipData for Peter / Weltrangliste / Marktwert / Frequenz
  if (tipData) {
    for (let i = 0; i < n; i++) {
      const base = { datum: data.gameDates[i], spiel: data.gameNames[i], resultat: (data.gameResults[i]||'') };
      tipData.push({ ...base, name: VIRT_FIFA, tipp: virtTip(data.gameNames[i], FIFA_RANG_DATA) });
      tipData.push({ ...base, name: VIRT_MW,   tipp: virtTip(data.gameNames[i], MW_RANG) });
    }
  }
}
let matrixSort = { col: '_total', dir: -1 };
let pktSort = { col: 'total', dir: -1 };  // 'total' or point value (number)
let uebSort     = { col: 'tot', dir: -1 };
let zehnpSort   = { col: 'tot', dir: -1 };
let zehnplusSort= { col: 'tot', dir: -1 };

let x2Sort      = { col: 'tot', dir: -1 };
let peterSort   = { col: 'tot', dir: -1 };
let fairSort    = { col: 'tot', dir: -1 };

// ── Startup: use embedded data if available ───────────────────

/* ── CONFIG ──────────────────────────────────────────────── */
function _cfgInit() {
  try {
    const lsF = localStorage.getItem('cfg_former');
    const lsE = localStorage.getItem('cfg_extra');
    const base = Array.isArray(CFG_HIDDEN) ? CFG_HIDDEN : [];
    return {
      former: new Set(lsF !== null ? JSON.parse(lsF) : base),
      extra:  lsE !== null ? JSON.parse(lsE) : (Array.isArray(CFG_EXTRA) ? CFG_EXTRA.map(r=>({name:r.name||'',id:r.id||''})) : [])
    };
  } catch(_) {
    return { former: new Set(Array.isArray(CFG_HIDDEN)?CFG_HIDDEN:[]), extra: [] };
  }
}
let {former: _cfgFormer, extra: _cfgExtra} = _cfgInit();

function _cfgSave() {
  try {
    localStorage.setItem('cfg_former', JSON.stringify([..._cfgFormer]));
    localStorage.setItem('cfg_extra',  JSON.stringify(_cfgExtra));
  } catch(_) {}
}

// Für Ranglisten/Charts: alle former sind ausgeblendet
function isPlayerHidden(name){ return _cfgFormer.has(name); }
function getHiddenPlayers(){ return _cfgFormer; }

function renderConfig() {
  const el = document.getElementById('config-inner');
  if (!el || !data) return;

  const aktive   = data.members.filter(n => !_cfgFormer.has(n));
  const ehemalige = [..._cfgFormer];

  const btnF = (name,i) => `<button onclick="cfgMakeFormer('${name.replace(/'/g,"\\'")}','aktiv-${i}')"
    style="font-size:10px;background:#ff9500;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer">→ ehemaliger</button>`;
  const btnA = (name,i) => `<button onclick="cfgMakeActive('${name.replace(/'/g,"\\'")}','ehem-${i}')"
    style="font-size:10px;background:#34c759;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer">→ aktiv</button>`;

  const rowEhemal = ehemalige.length === 0
    ? `<tr><td colspan="3" style="color:#aaa;font-style:italic">Keine ehemaligen Mitglieder</td></tr>`
    : ehemalige.map((name,i)=>`<tr>
        <td style="color:#6c6c70;width:24px">${i+1}</td>
        <td>${name}</td>
        <td style="text-align:right">${btnA(name,i)}</td>
      </tr>`).join('');

  const rowAktiv = aktive.length === 0
    ? `<tr><td colspan="3" style="color:#aaa;font-style:italic">Keine aktiven Mitglieder</td></tr>`
    : aktive.map((name,i)=>`<tr>
        <td style="color:#6c6c70;width:24px">${i+1}</td>
        <td>${name}</td>
        <td style="text-align:right">${btnF(name,i)}</td>
      </tr>`).join('');

  const rowExtra = _cfgExtra.length === 0
    ? `<tr><td colspan="3" style="color:#aaa;font-style:italic">Noch keine Einträge</td></tr>`
    : _cfgExtra.map((p,i)=>`<tr>
        <td><input value="${(p.name||'').replace(/"/g,'&quot;')}" oninput="cfgExtraEdit(${i},'name',this.value)"
          placeholder="Name" style="width:130px;font-size:11px;border:1px solid #d1d1d6;border-radius:4px;padding:2px 5px;font-family:inherit"></td>
        <td><input value="${(p.id||'').replace(/"/g,'&quot;')}" oninput="cfgExtraEdit(${i},'id',this.value)"
          placeholder="SRF-ID" style="width:80px;font-size:11px;border:1px solid #d1d1d6;border-radius:4px;padding:2px 5px;font-family:inherit"></td>
        <td style="text-align:right"><button onclick="cfgExtraDel(${i})"
          style="font-size:10px;background:#ff3b30;color:#fff;border:none;border-radius:4px;padding:2px 6px;cursor:pointer">✕</button></td>
      </tr>`).join('');

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="font-size:13px;font-weight:700;color:#1c1c1e">⚙️ Konfiguration</span>
      <span style="font-size:10px;color:#34c759">● automatisch gespeichert</span>
    </div>
    <table class="ptable" style="width:auto;min-width:380px;table-layout:fixed">
      <colgroup><col style="width:22px"><col><col style="width:110px"></colgroup>
      <tbody>
        <tr class="game-header"><td colspan="3">#&nbsp;&nbsp;Ehemalige Mitglieder
          <span style="font-weight:normal;color:#6c6c70;font-size:10px;margin-left:6px">— ausgeblendet in allen Ranglisten</span></td></tr>
        ${rowEhemal}
        <tr class="game-header"><td colspan="3">#&nbsp;&nbsp;Aktive Mitglieder
          <span style="font-weight:normal;color:#6c6c70;font-size:10px;margin-left:6px">— erscheinen in allen Ranglisten</span></td></tr>
        ${rowAktiv}
        <tr class="game-header"><td colspan="3">Zusätzliche Spieler
          <span style="font-weight:normal;color:#6c6c70;font-size:10px;margin-left:6px">— nicht in SRF-Gruppe</span>
          <button onclick="cfgExtraAdd()" style="margin-left:10px;font-size:10px;background:#007aff;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer">+ Hinzufügen</button>
        </td></tr>
        ${rowExtra}
      </tbody>
    </table>`;
}

function cfgMakeFormer(name) {
  _cfgFormer.add(name);
  _cfgSave();
  if (currentTab==='rangliste') calcRanking();
  if (chart) { chart.destroy(); chart=null; }
  renderConfig();
}
function cfgMakeActive(name) {
  _cfgFormer.delete(name);
  _cfgSave();
  if (currentTab==='rangliste') calcRanking();
  if (chart) { chart.destroy(); chart=null; }
  renderConfig();
}
function cfgExtraEdit(i, field, val) { _cfgExtra[i][field]=val; _cfgSave(); }
function cfgExtraDel(i)  { _cfgExtra.splice(i,1); _cfgSave(); renderConfig(); }
function cfgExtraAdd()   { _cfgExtra.push({name:'',id:''}); _cfgSave(); renderConfig(); }
/* ── END CONFIG ───────────────────────────────────────────── */

window.addEventListener('DOMContentLoaded', () => {
  if (EMBEDDED_RANG) {
    data = EMBEDDED_RANG;
    if(!data.gameResults) data.gameResults = data.gameNames.map(()=>'');
    injectVirtualPlayers();
    buildDropdowns(); switchRangliste('uebersicht');
    const dz = document.getElementById('dz-rang');
    if (dz) { dz.textContent = `✅ Eingebettete Daten — ${data.members.length} Spieler, ${data.gameNums.length} Spiele`; dz.classList.add('loaded'); dz.onclick = null; }
    const rt = document.getElementById('ranking-toggle'); if (rt) rt.style.display = 'block';
    const dt = document.getElementById('dz-tipps'); if (dt) dt.style.display = 'block';
  } else {
    document.getElementById('hint').textContent = 'Bitte WM_Rangverlauf CSV laden';
  }
  if (EMBEDDED_TIPPS) {
    tipData = EMBEDDED_TIPPS;
    injectVirtualPlayers(); // re-inject now that tipData is available
    const dz = document.getElementById('dz-tipps');
    if (dz) { dz.textContent = `✅ Eingebettete Tipps — ${tipData.length} Einträge`; dz.classList.add('loaded'); dz.onclick = null; }
    // refresh the active ranking sub-tab if visible
    if (currentTab === 'rangliste') {
      for (const id of ['uebersicht','rangverlaufchart','10punkte','10plus','x2','peter','fair','bonus','favoriten','zeitraum']) {
        const el = document.getElementById('sub-' + id);
        if (el && el.style.display !== 'none') { switchRangliste(id); break; }
      }
    }
  }
});

// ── Manual file loaders (fallback) ───────────────────────────
function setupDrop(dzId, inputId, handler) {
  const dz = document.getElementById(dzId), fi = document.getElementById(inputId);
  if (!dz || !fi) return; // Sidebar-Elemente entfernt – kein Drop-Setup nötig
  fi.addEventListener('change', e => e.target.files[0] && handler(e.target.files[0], dz));
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handler(e.dataTransfer.files[0], dz);
  });
}
setupDrop('dz-rang',  'fi-rang',  (f, dz) => readCSV(f, t => onRangverlauf(t, f.name, dz)));
setupDrop('dz-tipps', 'fi-tipps', (f, dz) => readCSV(f, t => onTipps(t, f.name, dz)));

function readCSV(file, cb) {
  const r = new FileReader();
  r.onload = e => cb(e.target.result);
  r.readAsText(file, 'utf-8');
}
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  return text.trim().split(/\r?\n/).map(l => l.split(';').map(c => c.trim().replace(/^"|"$/g, '')));
}

function onRangverlauf(text, filename, dz) {
  const [header, ...lines] = parseCSV(text);
  const members = [];
  for (let i = 3; i < header.length; i += 2) members.push(header[i].replace(' Rang','').trim());
  const gameNums=[], gameDates=[], gameNames=[];
  const ranks=members.map(()=>[]), points=members.map(()=>[]);
  for (const cols of lines) {
    if (!cols[0]?.trim()) continue;
    gameNums.push(parseInt(cols[0])); gameDates.push(cols[1]||''); gameNames.push(cols[2]||'');
    for (let p=0;p<members.length;p++) {
      ranks[p].push(parseInt(cols[3+p*2])||0); points[p].push(parseInt(cols[3+p*2+1])||0);
    }
  }
  data = { members, gameNums, gameDates, gameNames, gameResults: gameNames.map(()=>''), ranks, points };
  injectVirtualPlayers();
  buildDropdowns(); switchRangliste('uebersicht');
  dz.textContent=`✅ ${filename}  —  ${members.length} Spieler, ${gameNums.length} Spiele`;
  dz.classList.add('loaded'); dz.onclick=null;
  const _dt = document.getElementById('dz-tipps'); if (_dt) _dt.style.display='block';
  const _rt = document.getElementById('ranking-toggle'); if (_rt) _rt.style.display='block';
}

function onTipps(text, filename, dz) {
  const [, ...lines] = parseCSV(text);
  tipData = lines.filter(c=>c[0]?.trim()).map(c=>({
    name:c[1], datum:c[3], spiel:c[6], tipp:c[7], resultat:c[8], punkte:parseInt(c[9])||0
  }));
  // Populate data.gameResults from tipData.resultat where still empty (CSV-loaded RANG)
  if (data) {
    const resMap={};
    for(const row of tipData){
      const k=(row.spiel||'').trim().toLowerCase(), r=(row.resultat||'').trim();
      if(r&&!resMap[k]) resMap[k]=r;
    }
    data.gameNames.forEach((gn,i)=>{ if(!data.gameResults[i]) data.gameResults[i]=resMap[gn.toLowerCase()]||''; });
  }
  injectVirtualPlayers(); // re-inject now that tipData + gameResults are available
  dz.textContent=`✅ ${filename}  —  ${tipData.length} Tipps`; dz.classList.add('loaded'); dz.onclick=null;
  if (currentTab==='resultate') calcResultate();
  else if (currentTab==='frequenz') calcFrequenz();
  else if (currentTab==='rangliste') {
    // Refresh active sub-tab (Peter/Weltrangliste/Marktwert need tipData)
    for(const id of ['uebersicht','rangverlaufchart','10punkte','10plus','x2','peter','fair','bonus','favoriten','zeitraum']){
      const el=document.getElementById('sub-'+id);
      if(el&&el.style.display!=='none'){switchRangliste(id);break;}
    }
  }
}

function setBonusMode(withBonus) {
  _showBonus = withBonus;
  const btnMit   = document.getElementById('btn-mit-bonus');
  const btnOhne  = document.getElementById('btn-ohne-bonus');
  if (btnMit && btnOhne) {

    btnOhne.style.color      = withBonus ? '#1a50a0' : '#fff';
  }
  if (data) buildChart();
}

let _bonusIndices = null;
function _computeBonusIndices() {
  if (!data) return {chIdx: null, finaleIdx: null};
  const chKw = ['schweiz', 'switzerland', 'suisse', 'svizzera'];
  let chIdx = null, finaleIdx = null;
  data.gameNames.forEach((n, i) => {
    const nl = n.toLowerCase();
    if (chKw.some(k => nl.includes(k))) chIdx = i;
  });
  if (typeof WM_FINALS_DATA !== 'undefined' && WM_FINALS_DATA.f && WM_FINALS_DATA.f[0]) {
    const f = WM_FINALS_DATA.f[0];
    if (f.r) {
      const t1 = f.t1.toLowerCase(), t2 = f.t2.toLowerCase();
      data.gameNames.forEach((n, i) => {
        const nl = n.toLowerCase();
        if (nl.includes(t1) && nl.includes(t2)) finaleIdx = i;
      });
    }
  }
  return {chIdx, finaleIdx};
}
function getBonusAt(p, g) {
  if (!_bonusIndices) _bonusIndices = _computeBonusIndices();
  const {chIdx, finaleIdx} = _bonusIndices;
  const name = data.members[p];
  const zd = (typeof ZUSATZ_DATA !== 'undefined' && ZUSATZ_DATA[name]) || {};
  let b = 0;
  if (chIdx != null && g >= chIdx)     b += (zd.p_ch || 0) + (zd.p_t_ch || 0);
  if (finaleIdx != null && g >= finaleIdx) b += (zd.p_wm || 0) + (zd.p_t_k || 0) + (zd.p_nullnull || 0);
  return b;
}

function getRanksForChart() {
  const {members, points} = data;
  const G = points[0]?.length || 0;
  // Punkte anpassen: Mit Bonus = wie im CSV; Ohne Bonus = gestaffelten Bonus abziehen
  const adjPoints = members.map((_, p) =>
    points[p].map((pt, g) => _showBonus ? pt + getBonusAt(p, g) : pt)
  );
  // Rang neu berechnen pro Spiel
  const adjRanks = members.map(() => new Array(G));
  for (let g = 0; g < G; g++) {
    const ptsG   = members.map((_, p) => adjPoints[p][g]);
    const sorted = [...ptsG].sort((a, b) => b - a);
    for (let p = 0; p < members.length; p++) {
      adjRanks[p][g] = sorted.indexOf(ptsG[p]) + 1;
    }
  }
  return adjRanks;
}

function buildChart() {
  const {members,gameNums,gameDates,ranks,points}=data, N=members.length;
  const chartRanks = getRanksForChart();
  const labels=gameNums.map((n,i)=>`Spiel ${n}\n${(gameDates[i]||'').slice(0,6)}`);
  const hidden=getHiddenPlayers();
  const datasets=members.map((name,p)=>({
    label:name, data:chartRanks[p], borderColor:PALETTE[p], backgroundColor:PALETTE[p],
    borderWidth:1.8, pointRadius:4, pointHoverRadius:7, tension:0, fill:false, order:N-p
  })).filter((_,p)=>!hidden.has(members[p])&&!isVirtHidden(members[p]));
  if (chart) chart.destroy();
  const hintEl=document.getElementById('hint-rangverl'); if(hintEl) hintEl.style.display='none';
  const canvas=document.getElementById('myChart');
  const rankLabelPlugin={id:'rankLabels',afterDatasetsDraw(ch){
    const ctx=ch.ctx;
    ch.data.datasets.forEach((ds,p)=>{
      const isActive=activePlayer===p;
      if (!isActive) return; // only show numbers for the highlighted player
      const meta=ch.getDatasetMeta(p); if (meta.hidden) return;
      meta.data.forEach((pt,g)=>{
        ctx.save(); ctx.font='bold 12px -apple-system, BlinkMacSystemFont, Arial';
        ctx.fillStyle=PALETTE[p];
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(ds.data[g],pt.x,pt.y-7); ctx.restore();
      });
    });
  }};
  chart=new Chart(canvas.getContext('2d'),{type:'line',data:{labels,datasets},plugins:[rankLabelPlugin],options:{
    responsive:true,maintainAspectRatio:false,animation:{duration:250},
    scales:{
      y:{reverse:true,min:0.5,max:N+0.5,
        ticks:{stepSize:1,color:'#6c6c70',font:{size:10,family:'-apple-system,BlinkMacSystemFont,Arial'},callback:v=>Number.isInteger(v)?v:''},
        grid:{color:'rgba(255,255,255,0.06)'},title:{display:true,text:'Rang',color:'#8e8e93',font:{size:11,family:'-apple-system,BlinkMacSystemFont,Arial'}}},
      x:{ticks:{color:'#6c6c70',font:{size:9,family:'-apple-system,BlinkMacSystemFont,Arial'},maxRotation:90,minRotation:90},grid:{color:'rgba(0,0,0,0.07)'}}
    },
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(255,255,255,0.97)',
      titleColor:'#1c1c1e',bodyColor:'#6c6c70',borderColor:'#d1d1d6',borderWidth:1,
      cornerRadius:8,
      callbacks:{title:c=>c[0]?.label||'',label:c=>{const p=c.datasetIndex,g=c.dataIndex,pts=data.points[p][g]+(_showBonus?getBonusAt(p,g):0);return`  ${data.members[p]}: Rang ${c.raw}   (${pts} Pkt. kum.)`;}}}}
  }});
  renderRvFilter();
  applyRvFilter();
}

// ── Sidebar ───────────────────────────────────────────────────
function buildSidebar() {
  const {members}=data;
  const chartRanks=getRanksForChart();
  const sorted=[...Array(members.length).keys()].sort((a,b)=>members[a].localeCompare(members[b]));
  const list=document.getElementById('player-list'); list.innerHTML='';
  for (const p of sorted){
    const div=document.createElement('div'); div.className='player-item'; div.dataset.idx=p;
    const fr=chartRanks[p].length?chartRanks[p][chartRanks[p].length-1]:'?';
    div.innerHTML=`<div class="color-swatch" style="background:${PALETTE[p]}"></div>
      <span class="player-name">${members[p]}</span><span class="player-rank">(${fr})</span>`;
    div.addEventListener('click',()=>toggleHighlight(p)); list.appendChild(div);
  }
}

// ── Highlight ─────────────────────────────────────────────────
function toggleHighlight(p){
  if (activePlayer===p){resetHighlight();return;} activePlayer=p;
  const N=data.members.length;
  chart.data.datasets.forEach((ds,i)=>{
    const a=i===p;
    ds.borderColor=ds.backgroundColor=a?PALETTE[i]:hexAlpha(PALETTE[i],0.07);
    ds.borderWidth=a?3:1; ds.pointRadius=a?(isMobile?2:3):(isMobile?0.5:1); ds.order=a?0:N;
  }); chart.update('none');
  document.querySelectorAll('.player-item').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.idx)===p));
}
const isMobile = window.innerWidth < 768;
function resetHighlight(){
  activePlayer=null; const N=data?.members.length||0;
  chart?.data.datasets.forEach((ds,i)=>{ds.borderColor=ds.backgroundColor=PALETTE[i];ds.borderWidth=1.8;ds.pointRadius=isMobile?1:2;ds.order=N-i;});
  chart?.update('none'); document.querySelectorAll('.player-item').forEach(el=>el.classList.remove('active'));
}

}
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('#main-tab-bar .tab-btn').forEach((b,i)=>b.classList.toggle('active',['rangliste','punktevert','resultate','frequenz','vergleich','gruppen','config'][i]===name));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='rangliste') calcRanking();
  else if(name==='punktevert') calcPunkteverteilung();
  else if(name==='resultate') calcResultate();
  else if(name==='gruppen') calcGruppen();
  else if(name==='vergleich') calcVergleich();
  else if(name==='config') renderConfig();
  else calcFrequenz();
}

function buildDropdowns(){
  const von=document.getElementById('sel-von'); von.innerHTML='';
  data.gameNums.forEach((n,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`Spiel ${n}  (${data.gameDates[i]})`;von.appendChild(o);});
  updateBisOptions(); refreshTabs();
}
function updateBisOptions(){
  const fromIdx=parseInt(document.getElementById('sel-von').value);
  const bis=document.getElementById('sel-bis'); const prev=parseInt(bis.value); bis.innerHTML='';
  data.gameNums.forEach((n,i)=>{
    if(i<fromIdx)return; const o=document.createElement('option'); o.value=i;
    o.textContent=`Spiel ${n}  (${data.gameDates[i]})`;
    if(i===prev||((isNaN(prev)||prev<fromIdx)&&i===data.gameNums.length-1))o.selected=true; bis.appendChild(o);
  });
}
function refreshTabs(){
  const fi=parseInt(document.getElementById('sel-von').value), ti=parseInt(document.getElementById('sel-bis').value);
  const v=data.gameNums[fi], b=data.gameNums[ti];
  document.getElementById('ranking-subtitle').textContent=v===b?`Spiel ${v}`:`Spiel ${v} – Spiel ${b}`;
  if(currentTab==='rangliste') calcRanking();
  else if(currentTab==='punktevert') calcPunkteverteilung();
  else if(currentTab==='resultate') calcResultate();
  else if(currentTab==='gruppen'||currentTab==='punkte') return;
  else if(currentTab==='vergleich'){calcVergleich();return;}
  else calcFrequenz();
}

// ── Tab 1: Rangliste ──────────────────────────────────────────
function getRankingRows(){
  const fi=parseInt(document.getElementById('sel-von').value), ti=parseInt(document.getElementById('sel-bis').value);
  const hidden=getHiddenPlayers();
  const rows=data.members.map((name,p)=>({name,color:PALETTE[p],
    points:data.points[p][ti]-(fi>0?data.points[p][fi-1]:0)}))
    .filter(r=>!hidden.has(r.name)&&!isVirtHidden(r.name));
  rows.sort((a,b)=>b.points-a.points);
  let rank=1; rows.forEach((r,i)=>{if(i>0&&r.points<rows[i-1].points)rank=i+1;r.rank=rank;});
  return rows;
}

function roundFrac(v){
  if(!v||typeof v!=='string') return String(v??'?');
  const r=v.toLowerCase();
  if(r.includes('sechzehntel'))  return '1/16';
  if(r.includes('achtel'))       return '1/8';
  if(r.includes('viertel'))      return '1/4';
  if(r.startsWith('halbfinal')||r.includes('halbfinale')) return '1/2';
  if(r==='final'||r.includes('finale')) return '1/1';
  if(r.includes('sieger')||r.includes('winner')) return '🏆';
  if(r.includes('gruppe')||r.includes('vorrunde')) return 'GP';
  return v;  // Klartext zurückgeben (z.B. Ländername, Zahl)
}

function _refreshVirtual(){
  // Rangverlauf-Chart muss bei Änderung neu gebaut werden
  if(chart){chart.destroy();chart=null;}
  // refresh all ranking sub-tabs + Häufigste Tipps + Frequenz
  const visRangliste=['uebersicht','rangverlauf','rangverlaufchart','10punkte','10plus','x2','peter','fair','bonus','favoriten','zeitraum'];

  }
  if(currentTab==='resultate') calcResultate();
  if(currentTab==='frequenz')  calcFrequenz();
}
function buildWideTable(players, sortState, sortFn, cols, groupHdrHtml){
  players=players.filter(p=>(p.name!==VIRT_FIFA||showFifa)&&(p.name!==VIRT_MW||showMW));
  const {col:sc,dir:sd}=sortState;
  const sorted=[...players].sort((a,b)=>{
    const av=a[sc],bv=b[sc];
    return typeof av==='string'?sd*av.localeCompare(bv):sd*(av-bv);
  });
  let rank=1;
  sorted.forEach((r,i)=>{
    if(i>0){const pv=sorted[i-1][sc],cv=r[sc];if(typeof cv==='number'?cv!==pv:true)rank=i+1;}
    r.rank=rank;
  });
  function thS(lbl,col,w,opts){
    opts=opts||{};
    if(opts.raw){
      const bl=opts.sep?'border-left:1px solid rgba(0,0,0,0.15);':'';
      const al=opts.align||'right';
      return `<th style="width:${w}px;text-align:${al};color:#444;font-weight:normal;white-space:nowrap;padding:2px 4px;${bl}">${lbl}</th>`;
    }
    const active=sortState.col===col;
    const arrow=active?(sortState.dir===-1?' ▼':' ▲'):'';
    const c=active?'#1a50a0':(opts.sub?'#1a50a0':'#444');
    const fw=active?'bold':'normal';
    const bl=opts.sep?'border-left:1px solid rgba(0,0,0,0.15);':'';
    return `<th style="width:${w}px;text-align:right;cursor:pointer;color:${c};font-weight:${fw};white-space:nowrap;padding:2px 4px;${bl}" onclick="${sortFn}('${col}')">${lbl}${arrow}</th>`;
  }
  const hdr=cols.map(c=>thS(c.lbl,c.col,c.w,c)).join('');
  const trows=sorted.map((r,i)=>{
    const bg=r.rank===1?'background:#fffbe6':r.rank===2?'background:#f5f5f5':r.rank===3?'background:#fff4ee':(i%2===0?'background:#ffffff':'background:#f7f7f9');
    const nameStyle=r.virtual?'color:#1a50a0;font-weight:bold':'';
    const dot=r.virtual?'⚡ ':`<span style="display:inline-block;width:7px;height:7px;border-radius:1px;background:${r.color};margin-right:4px;vertical-align:middle"></span>`;

function prepareZusatz(){
  const zusatz=(typeof ZUSATZ_DATA!=='undefined')?ZUSATZ_DATA:{};
  const hasZusatz=Object.keys(zusatz).length>0;
  const zusatzKeys=hasZusatz?Object.keys(Object.values(zusatz)[0]).filter(k=>k!=='punkte'&&!k.startsWith('p_')):[];
  const ZUS_LABELS=['🏆','🇨🇭','⚽🇨🇭','⚽👑','🚲'];
  const keyW={};
  if(hasZusatz&&zusatzKeys.length>0&&data){
    zusatzKeys.forEach(k=>{
      let maxLen=1;
      data.members.forEach(nm=>{
        const v=zusatz[nm]?.[k];
        if(v!=null){const d=typeof v==='string'?roundFrac(v):String(v);maxLen=Math.max(maxLen,d.length);}
      });
      keyW[k]=Math.max(24,maxLen*7+6);
    });
  }
  function playerZus(name){
    const zus=hasZusatz?(zusatz[name]?.punkte??0):0;
    const perKey={};
    if(hasZusatz&&zusatz[name]&&zusatzKeys.length>0){
      zusatzKeys.forEach(k=>{
        const v=zusatz[name][k];
        const pts=zusatz[name]?.['p_'+k]??0;
        const correct=pts>0;
        if(v===undefined||v===null){
          perKey['_zus_'+k]=`<span style="color:#bbb">—</span>`;
        }else{
          const txt=(typeof v==='string'?roundFrac(v):String(v)).replace(/mehr als (\d+)/gi,'>$1');
          perKey['_zus_'+k]=correct
            ?`<span style="background:#ffd60a;color:#000;border-radius:3px;padding:0 3px;font-weight:600">${txt}</span>`
            :`<span style="color:#3a3a3c">${txt}</span>`;
        }
      });
    }
    return{zus,...perKey};
  }
  const legend='';
  // One column per bonus key, emoji as header
  const bonusCols=hasZusatz?[
    ...zusatzKeys.slice(0,ZUS_LABELS.length).map((k,i)=>({
      lbl:`<span style="font-size:12px">${ZUS_LABELS[i]||k}</span>`,
      col:'_zus_'+k, w:keyW[k]||30, sep:i===0, raw:true, align:'center'
    })),
    {lbl:'∑', col:'zus', w:28, sub:true},
  ]:[];
  const nBonusCols=zusatzKeys.slice(0,ZUS_LABELS.length).length;
  const bonusGrpTh=hasZusatz
    ?`<th colspan="${nBonusCols+1}" style="text-align:center;font-size:8.5px;color:#000;border-left:1px solid rgba(0,0,0,0.15);border-bottom:1px solid rgba(0,0,0,0.15);padding:2px 0">Bonus</th>`:'';
  return{zusatz,hasZusatz,zusatzKeys,keyW,ZUS_LABELS,playerZus,legend,bonusCols,bonusGrpTh};
}

function calcRanking(){
  const rows=getRankingRows();
  const rowHtml=rows.map(r=>{
    const bg=r.rank===1?'background:#fffbe6':r.rank===2?'background:#f5f5f5':r.rank===3?'background:#fff4ee':'';
    return `<tr style="${bg}">
      <td class="rank-num" style="width:20px">${r.rank}</td>
      <td style="font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        <span style="display:inline-block;width:7px;height:7px;border-radius:1px;background:${r.color};margin-right:4px;vertical-align:middle;flex-shrink:0"></span>${r.name}
      </td>
      <td class="rank-pts" style="width:32px">${r.points}</td></tr>`;
  }).join('');
  const rb=document.getElementById('ranking-body'); if(rb) rb.innerHTML=rowHtml;
  const rz=document.getElementById('ranking-body-zeitraum'); if(rz) rz.innerHTML=rowHtml;

  const el=document.getElementById('ranking-phasen');
  const n=data.gameNums.length;
  if(n<2){el.innerHTML='';return;}

  const lastG=data.gameNums[n-1]||n;
  const gpEnd=data.gameNums.findIndex(g=>g>72);
  const koFirst=gpEnd===-1?n:gpEnd;
  const gsEnd=Math.min(koFirst-1,n-1);

  // Per-phase points helper (index-based)
  function phPts(p,fi,ti){
    fi=Math.max(0,fi); ti=Math.min(n-1,ti);
    if(fi>ti||fi>=n) return 0;
    return data.points[p][ti]-(fi>0?data.points[p][fi-1]:0);
  }
  // Find index range for game-number interval
  function findRng(minN,maxN){
    const fi=data.gameNums.findIndex(g=>g>=minN);
    if(fi===-1||fi>=n) return null;
    let ti=fi; while(ti<n-1&&data.gameNums[ti+1]<=maxN) ti++;
    return {fi,ti};
  }

  const {hasZusatz,playerZus,legend:zusLegend,bonusCols}=prepareZusatz();
  const r32=findRng(73,88), r16=findRng(89,96),
        qf=findRng(97,100), sf=findRng(101,102), ff=findRng(103,200);
  const hasSrf=typeof SRF_LEADERBOARD!=='undefined'&&Object.keys(SRF_LEADERBOARD).length>0;
  const players=data.members.map((name,p)=>{
    const r1=phPts(p,0,Math.min(23,gsEnd));
    const r2=phPts(p,24,Math.min(47,gsEnd));
    const r3=phPts(p,48,Math.min(gsEnd,n-1));
    const gstot=r1+r2+r3;
    const v16=r32?phPts(p,r32.fi,r32.ti):0;
    const v8 =r16?phPts(p,r16.fi,r16.ti):0;
    const v4 = qf?phPts(p,qf.fi,qf.ti)  :0;
    const v2 = sf?phPts(p,sf.fi,sf.ti)  :0;
    const v1 = ff?phPts(p,ff.fi,ff.ti)  :0;
    const fstot=v16+v8+v4+v2+v1;
    const zusR=playerZus(name);const zus=zusR.zus;
    const srf=hasSrf?(SRF_LEADERBOARD[name]||{}):{};
    return {name,color:PALETTE[p],r1,r2,s2:r1+r2,r3,gstot,
      v16,c16:gstot+v16,v8,c8:gstot+v16+v8,v4,c4:gstot+v16+v8+v4,
      v2,c2:gstot+v16+v8+v4+v2,v1,fstot,tot:gstot+fstot+zus,...zusR,
      srf_pkt:srf.srf_punkte??'–',srf_rang:srf.srf_rang??'–'};
  });
  const {cols,groupHdr}=wideColsGF(hasZusatz,bonusCols);
  const srfCols=hasSrf?[
    {lbl:'SRF #',col:'srf_rang',w:38,sep:true},
  ]:[];
  const srfGrpTh=hasSrf?`<th colspan="1" style="text-align:center;font-size:8.5px;color:#1a50a0;font-weight:600;border-left:1px solid rgba(0,0,0,0.15);padding:2px 0">SRF</th>`:'';
  const fullGroupHdr=groupHdr.replace('</tr>',srfGrpTh+'</tr>');
  el.innerHTML=zusLegend+buildWideTable(players,uebSort,'sortUeb',[...cols,...srfCols],hasSrf?fullGroupHdr:groupHdr);
}

function sanitizePdfText(s){
  if(!s) return '';
  return s
    .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{1F300}-\u{1FAFF}]/gu,'') // strip emojis
    .replace(/∑/g,'S')          // n-ary summation → S (not in WinAnsi)
    .replace(/[↓↑→←]/g,'')     // sort arrows

function tipDir(s){
  const m=(s||'').match(/^(\d+):(\d+)/);
  if(!m) return null;
  const [g1,g2]=[parseInt(m[1]),parseInt(m[2])];
  return g1>g2?'W1':g2>g1?'W2':'D';
}


function calcEinPunkt(){
  const el=document.getElementById('einpunkt-body');
  if(!data){el.innerHTML='';return;}
  const n=data.gameNums.length;
  const gpEnd=data.gameNums.findIndex(g=>g>72);
  const koFirst=gpEnd===-1?n:gpEnd;
  const lastG=data.gameNums[n-1]||n;

  const tipLkp={};
  if(tipData){
    for(const row of tipData){
      const gn=(row.spiel||'').trim().toLowerCase();
      if(!tipLkp[gn]) tipLkp[gn]={};
      const d=tipDir((row.tipp||'').trim());
      if(d) tipLkp[gn][(row.name||'').trim()]=d;
    }
  }

  function scoreRange(fi,ti){
    fi=Math.max(0,fi); ti=Math.min(n-1,ti);
    if(fi>ti||fi>=n) return null;
    const rows=data.members.map((name,p)=>{
      let pts=0;
      for(let i=fi;i<=ti;i++){
        const actual=tipDir(data.gameResults[i]);
        if(!actual) continue;
        const gn=data.gameNames[i].toLowerCase();
        if(tipLkp[gn]?.[name]===actual) pts++;
      }
      return {name,color:PALETTE[p],points:pts};
    });
    rows.sort((a,b)=>b.points-a.points);
    let rank=1;
    rows.forEach((r,i)=>{if(i>0&&r.points<rows[i-1].points)rank=i+1;r.rank=rank;});
    return rows;
  }

  function tbl(label,rows){

// ── Sub-Tab: Favoriten ───────────────────────────────────────
let favSort = {col:'fav', dir:-1};
function sortFav(col){
  if(favSort.col===col) favSort.dir*=-1; else {favSort.col=col; favSort.dir=-1;}
  calcFavoriten();
}

function calcFavoriten(){
  const el=document.getElementById('favoriten-body');
  if(!data){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px;">Bitte WM_Rangverlauf CSV laden.</p>';return;}
  const n=data.gameNums.length;

  // Tip-Lookup: Spielname → {Spielername → W1/W2/D}
  const tipLkp={};
  if(tipData){
    for(const row of tipData){
      const gn=(row.spiel||'').trim().toLowerCase();
      if(!tipLkp[gn]) tipLkp[gn]={};
      const d=tipDir((row.tipp||'').trim());
      if(d) tipLkp[gn][(row.name||'').trim()]=d;
    }
  }

  // Zähler pro Spieler
  const stats={};
  for(const name of data.members) stats[name]={fav:0,auss:0,draw:0,favOk:0,aussOk:0,drawOk:0,total:0};

  // Echte Spielergebnisse zählen
  let gFav=0,gAuss=0,gDraw=0,gTotal=0;

  for(let i=0;i<n;i++){
    const parts=data.gameNames[i].split(' vs ');
    if(parts.length!==2) continue;
    const t1=parts[0].trim(),t2=parts[1].trim();
    const r1=FIFA_RANG_DATA[t1],r2=FIFA_RANG_DATA[t2];
    if(!r1||!r2) continue; // kein FIFA-Rang → überspringen

    // Favorit = niedrigere Rangnummer (Rang 1 = bestes Team)
    const favDir=r1<r2?'W1':'W2';
    const ausDir=r1<r2?'W2':'W1';

    // Tatsächliches Ergebnis
    const actual=tipDir(data.gameResults[i]);
    if(actual){
      gTotal++;
      if(actual===favDir) gFav++;
      else if(actual===ausDir) gAuss++;
      else gDraw++;
    }

    // Tipps pro Spieler klassieren
    const gn=data.gameNames[i].toLowerCase();
    for(const name of data.members){
      const tip=tipLkp[gn]?.[name];
      if(!tip) continue;
      stats[name].total++;
      if(tip===favDir){
        stats[name].fav++;
        if(actual===favDir) stats[name].favOk++;
      } else if(tip===ausDir){
        stats[name].auss++;
        if(actual===ausDir) stats[name].aussOk++;
      } else {
        stats[name].draw++;
        if(actual==='D') stats[name].drawOk++;
      }
    }
  }

  // Spieler-Array aufbauen (virtuelle Spieler je nach Toggle)
  let players=data.members.map((name,p)=>({name,color:PALETTE[p],...stats[name]}));
  players=players.filter(p=>(p.name!==VIRT_FIFA||showFifa)&&(p.name!==VIRT_MW||showMW));

  // Trefferquoten VOR dem Sortieren berechnen
  players.forEach(p=>{
    p.favPct  = p.fav >0 ? Math.round(p.favOk /p.fav *100) : 0;
    p.drawPct = p.draw>0 ? Math.round(p.drawOk/p.draw*100) : 0;
    p.aussPct = p.auss>0 ? Math.round(p.aussOk/p.auss*100) : 0;
    p.totalPct= p.total>0? Math.round((p.favOk+p.aussOk+p.drawOk)/p.total*100) : 0;
  });

  players.sort((a,b)=>{
    const cmp = favSort.col==='name'
      ? a.name.localeCompare(b.name,'de')
      : (b[favSort.col]||0)-(a[favSort.col]||0);
    return favSort.dir<0?cmp:-cmp;
  });

  // Rangnummern
  let rank=1;
  players.forEach((p,i)=>{
    if(i>0&&(p[favSort.col]||0)<(players[i-1][favSort.col]||0)) rank=i+1;
    p.rank=rank;
  });

  // Statistik-Box
  const pct=v=>gTotal>0?Math.round(v/gTotal*100):'–';
  const statsBar=`<div style="display:flex;gap:16px;align-items:center;margin:4px 0 10px;flex-wrap:wrap">
    <span style="font-size:10px;color:#555">📊 ${gTotal} Spiele analysiert</span>
    <span style="font-size:10px;background:#fff8e6;border:1px solid #e0c040;border-radius:4px;padding:2px 8px">⭐ Favorit gewann: <b>${gFav}×</b> <span style="color:#888">(${pct(gFav)}%)</span></span>
    <span style="font-size:10px;background:#f0f8ff;border:1px solid #4a90c8;border-radius:4px;padding:2px 8px">🤝 Unentschieden: <b>${gDraw}×</b> <span style="color:#888">(${pct(gDraw)}%)</span></span>
    <span style="font-size:10px;background:#fff0f0;border:1px solid #c05050;border-radius:4px;padding:2px 8px">💪 Aussenseiter gewann: <b>${gAuss}×</b> <span style="color:#888">(${pct(gAuss)}%)</span></span>
  </div>`;

  const rows=players.map((p,i)=>{
    const bg=i%2===0?'':'background:#f7f7f9';
    const bar=(count,ok,tot)=>{
      if(!tot) return '<span style="color:#bbb">–</span>';
      const pct2=Math.round(count/tot*100);
      return `<span style="font-weight:bold">${count}</span>`+
             `<span style="color:#888;font-size:8px"> (${pct2}%)</span>`+
             `<span style="color:#1a8040;font-size:8px;margin-left:3px">[${ok}✓ (${count>0?Math.round(ok/count*100):0}%)]</span>`;
    };
    return `<tr style="${bg}">
      <td style="text-align:center;color:#888;padding:3px 4px;width:18px">${p.rank}</td>
      <td style="padding:3px 6px;white-space:nowrap">
        <span style="display:inline-block;width:7px;height:7px;border-radius:1px;background:${p.color};margin-right:4px;vertical-align:middle"></span>${p.name}
      </td>
      <td style="text-align:center;padding:3px 8px;color:#8a6000">${bar(p.fav,p.favOk,p.total)}</td>
      <td style="text-align:center;padding:3px 8px;color:#1a5fa8">${bar(p.draw,p.drawOk,p.total)}</td>
      <td style="text-align:center;padding:3px 8px;color:#b83010">${bar(p.auss,p.aussOk,p.total)}</td>
      <td style="text-align:center;padding:3px 8px;color:#555;white-space:nowrap">${p.total||'–'}${p.total?`<span style="color:#1a8040;font-size:8px;margin-left:3px">(${Math.round((p.favOk+p.aussOk+p.drawOk)/p.total*100)}%✓)</span>`:''}
      </td>
    </tr>`;
  }).join('');

  // Spaltenköpfe mit doppeltem Sort: Anzahl + Trefferquote
  const thS=(countCol,pctCol,align,label)=>{
    const aC=favSort.col===countCol, aP=favSort.col===pctCol;
    const arrC=aC?(favSort.dir<0?' ↓':' ↑'):'', arrP=aP?(favSort.dir<0?' ↓':' ↑'):'';
    return `<th style="text-align:${align};padding:3px 6px;border-bottom:2px solid #d1d1d6;white-space:nowrap">`+
      `<span onclick="sortFav('${countCol}')" style="cursor:pointer;user-select:none;${aC?'color:#1a5fa8;font-weight:bold;':'color:#556;'}">${label}${arrC}</span>`+
      (pctCol?`<span onclick="sortFav('${pctCol}')" style="cursor:pointer;user-select:none;font-size:8px;margin-left:5px;${aP?'color:#1a8040;font-weight:bold;':'color:#aaa;'}">✓%${arrP}</span>`:'')
      +`</th>`;
  };

  const tbl=`<table class="ptable" style="font-size:10px;border-collapse:collapse;width:auto">
    <thead><tr>
      <th style="text-align:center;padding:3px 6px;border-bottom:2px solid #d1d1d6;color:#556">#</th>
      ${thS('name',null,'left','Name')}
      ${thS('fav','favPct','center','⭐ Favorit')}
      ${thS('draw','drawPct','center','🤝 Unentschieden')}
      ${thS('auss','aussPct','center','💪 Aussenseiter')}
      ${thS('total','totalPct','center','Tipps')}
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  el.innerHTML=`<p style="font-size:10.5px;color:#3a3a3c;margin:4px 0 0">
    Klassiert jeden Tipp anhand der FIFA-Weltrangliste: tippe ich auf das besser klassierte Team (Favorit), auf ein Unentschieden oder auf den Aussenseiter?</p>`+
    statsBar+tbl;
}

  function phPts(p,fi,ti){

// ── Sub-Tab: Peter ───────────────────────────────────────────
function calcPeter(){
  const el=document.getElementById('peter-body');
  if(!data){el.innerHTML='';return;}
  const n=data.gameNums.length;
  const gpEnd=data.gameNums.findIndex(g=>g>72);
  const koFirst=gpEnd===-1?n:gpEnd;
  const gsEnd=Math.min(koFirst-1,n-1);

  // Tip lookup: gameName → {playerName → tipString}
  const tipLkp={};
  if(tipData){
    for(const row of tipData){
      const gn=(row.spiel||'').trim().toLowerCase();
      if(!tipLkp[gn]) tipLkp[gn]={};
      const tipp=(row.tipp||'').trim();
      if(tipp) tipLkp[gn][(row.name||'').trim()]=tipp;
    }
  }

  // Peter score for one game (base, before multiplier)
  function pScore(tipStr,resultStr){
    if(!tipStr||!resultStr) return 0;
    const t=tipStr.split(':').map(Number), r=resultStr.split(':').map(Number);
    if(t.length!==2||r.length!==2||t.some(isNaN)||r.some(isNaN)) return 0;
    const tT=t[0]>t[1]?1:t[0]<t[1]?-1:0, rT=r[0]>r[1]?1:r[0]<r[1]?-1:0;
    if(t[0]===r[0]&&t[1]===r[1]) return 4;           // exact result
    if(rT!==0&&tT===rT&&(t[0]-t[1])===(r[0]-r[1])) return 3; // correct diff (no ties)
    if(tT===rT) return 2;                              // correct type
    return 0;
  }

  // Multiplier: 1/16+1/8 ×2, 1/4 ×3, 1/2 ×4, Final ×5
  function mult(g){return g<=72?1:g<=96?2:g<=100?3:g<=102?4:5;}

  function findRng(a,b){const fi=data.gameNums.findIndex(g=>g>=a);if(fi===-1||fi>=n)return null;let ti=fi;while(ti<n-1&&data.gameNums[ti+1]<=b)ti++;return{fi,ti};}

  function phPts(p,fi,ti){
    const name=data.members[p];
    fi=Math.max(0,fi);ti=Math.min(n-1,ti);if(fi>ti||fi>=n)return 0;
    let t=0;
    for(let i=fi;i<=ti;i++){
      const gn=data.gameNames[i].toLowerCase();
      const tipp=tipLkp[gn]?.[name]||'';
      const result=data.gameResults[i]||'';
      t+=pScore(tipp,result)*mult(data.gameNums[i]);
    }
    return t;
  }

  const {hasZusatz,playerZus,legend:zusLegend,bonusCols}=prepareZusatz();
  const r32=findRng(73,88),r16=findRng(89,96),qf=findRng(97,100),sf=findRng(101,102),ff=findRng(103,200);

  const players=data.members.map((name,p)=>{
    const r1=phPts(p,0,Math.min(23,gsEnd));
    const r2=phPts(p,24,Math.min(47,gsEnd));
    const r3=phPts(p,48,Math.min(gsEnd,n-1));
    const gstot=r1+r2+r3;
    const v16=r32?phPts(p,r32.fi,r32.ti):0;
    const v8 =r16?phPts(p,r16.fi,r16.ti):0;
    const v4 = qf?phPts(p,qf.fi,qf.ti)  :0;
    const v2 = sf?phPts(p,sf.fi,sf.ti)  :0;
    const v1 = ff?phPts(p,ff.fi,ff.ti)  :0;
    const fstot=v16+v8+v4+v2+v1;
    const zusR=playerZus(name);const zus=zusR.zus;
    return {name,color:PALETTE[p],r1,r2,s2:r1+r2,r3,gstot,
      v16,c16:gstot+v16,v8,c8:gstot+v16+v8,v4,c4:gstot+v16+v8+v4,
      v2,c2:gstot+v16+v8+v4+v2,v1,fstot,tot:gstot+fstot+zus,...zusR};
  });

  const {cols,groupHdr}=wideColsGF(hasZusatz,bonusCols);
  const legend=`<div style="font-size:10.5px;color:#3a3a3c;margin:4px 0 4px;line-height:1.8">Richtiger Typ <b style="color:#000">2P</b> · Richtige Tordifferenz (kein Unentschieden) <b style="color:#000">3P</b> · Richtiges Resultat <b style="color:#000">4P</b> &nbsp;|&nbsp; 1/16+1/8 ×<b style="color:#000">2</b> · 1/4 ×<b style="color:#000">3</b> · 1/2 ×<b style="color:#000">4</b> · Final ×<b style="color:#000">5</b></div>`;
  el.innerHTML=legend+zusLegend+buildWideTable(players,peterSort,'sortPeter',cols,groupHdr);
}

// ── Sub-Tab: Fair ─────────────────────────────────────────────────
function calcFair(){
  const el=document.getElementById('fair-body');
  if(!data){el.innerHTML='';return;}
  const n=data.gameNums.length;
  const gpEnd=data.gameNums.findIndex(g=>g>72);
  const koFirst=gpEnd===-1?n:gpEnd;
  const gsEnd=Math.min(koFirst-1,n-1);

  // Tip lookup
  const tipLkp={};
  if(tipData){
    for(const row of tipData){
      const gn=(row.spiel||'').trim().toLowerCase();
      if(!tipLkp[gn]) tipLkp[gn]={};
      const tipp=(row.tipp||'').trim();
      if(tipp) tipLkp[gn][(row.name||'').trim()]=tipp;
    }
  }

  // Fair score — no multipliers, all games equal weight
  function fairScore(tipStr,resultStr){
    if(!tipStr||!resultStr) return 0;
    const t=tipStr.split(':').map(Number), r=resultStr.split(':').map(Number);
    if(t.length!==2||r.length!==2||t.some(isNaN)||r.some(isNaN)) return 0;
    const tT=t[0]>t[1]?1:t[0]<t[1]?-1:0;
    const rT=r[0]>r[1]?1:r[0]<r[1]?-1:0;
    if(t[0]===r[0]&&t[1]===r[1]) return 10+(r[0]+r[1]); // exact result + 1P per goal
    if(rT!==0&&tT===rT&&(t[0]-t[1])===(r[0]-r[1])) return 10; // correct diff, non-draw
    if(tT===rT) return 5; // correct tendency / draw
    return 0;
  }

  function findRng(a,b){const fi=data.gameNums.findIndex(g=>g>=a);if(fi===-1||fi>=n)return null;let ti=fi;while(ti<n-1&&data.gameNums[ti+1]<=b)ti++;return{fi,ti};}

  function phPts(p,fi,ti){
    const name=data.members[p];
    fi=Math.max(0,fi);ti=Math.min(n-1,ti);if(fi>ti||fi>=n)return 0;
    let t=0;
    for(let i=fi;i<=ti;i++){
      const gn=data.gameNames[i].toLowerCase();
      const tipp=tipLkp[gn]?.[name]||'';
      const result=data.gameResults[i]||'';
      t+=fairScore(tipp,result);
    }
    return t;
  }

  const {hasZusatz,playerZus,legend:zusLegend,bonusCols}=prepareZusatz();
  const r32=findRng(73,88),r16=findRng(89,96),qf=findRng(97,100),sf=findRng(101,102),ff=findRng(103,200);

  const players=data.members.map((name,p)=>{
    const r1=phPts(p,0,Math.min(23,gsEnd));
    const r2=phPts(p,24,Math.min(47,gsEnd));
    const r3=phPts(p,48,Math.min(gsEnd,n-1));
    const gstot=r1+r2+r3;
    const v16=r32?phPts(p,r32.fi,r32.ti):0;
    const v8 =r16?phPts(p,r16.fi,r16.ti):0;
    const v4 = qf?phPts(p,qf.fi,qf.ti)  :0;
    const v2 = sf?phPts(p,sf.fi,sf.ti)  :0;
    const v1 = ff?phPts(p,ff.fi,ff.ti)  :0;
    const fstot=v16+v8+v4+v2+v1;
    const zusR=playerZus(name);const zus=zusR.zus;
    return {name,color:PALETTE[p],r1,r2,s2:r1+r2,r3,gstot,
      v16,c16:gstot+v16,v8,c8:gstot+v16+v8,v4,c4:gstot+v16+v8+v4,
      v2,c2:gstot+v16+v8+v4+v2,v1,fstot,tot:gstot+fstot+zus,...zusR};
  });

  const {cols,groupHdr}=wideColsGF(hasZusatz,bonusCols);
  const legend=`<div style="font-size:10.5px;color:#6c6c70;margin:4px 0 4px;line-height:1.8">Richtiger Sieger/Unentschieden: <b style="color:#1c1c1e">5P</b> &nbsp;·&nbsp; Richtiger Sieger + richtige Tordifferenz (kein Unentschieden): <b style="color:#1c1c1e">10P</b> &nbsp;·&nbsp; Richtiges Resultat: <b style="color:#1c1c1e">10P + 1P/Tor</b> &nbsp;|&nbsp; Alle Spiele gleich gewichtet</div>`;
  el.innerHTML=legend+zusLegend+buildWideTable(players,fairSort,'sortFair',cols,groupHdr);
}

  function hasTeam(arr){return (arr||[]).some(g=>g&&(g.t1===ch||g.t2===ch));}
  let chLabel;
  if(hasTeam(finals.f))           chLabel=weltmeister===ch?'🏆 Weltmeister!':'Finalteilnahme (Zweiter)';

      const t=data.gameNames[i].split(' vs ');
      if(t[0]&&t[0].trim()===ch) chGoals+=p[0];
      else if(t[1]&&t[1].trim()===ch) chGoals+=p[1];
    }
  }

  // Anzahl 0:0
  const nullNull=data?data.gameResults.filter(r=>r==='0:0').length:0;

  const zRows=[
    {frage:'Weltmeister',          val:wmCell},
    {frage:'Wie weit kommt die Schweiz', val:chCell},

  el.innerHTML=t1html+t2html;

// ── Sub-Tab: Punkteverteilung ─────────────────────────────────
function calcPunkteverteilung(){
  const el=document.getElementById('punkteverteilung-body');
  if(!data){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px">Keine Daten.</p>';return;}
  const n=data.gameNums.length;
  const gpEnd=data.gameNums.findIndex(g=>g>72);
  const koFirst=gpEnd===-1?n:gpEnd;
  const lastG=data.gameNums[n-1]||n;

  // Label-Maps: Punkte → Kürzel
  const GS_MAP={10:'Max',8:'S&D',6:'S&T',5:'S',1:'T'};
  const FS_MAP={20:'Max',16:'S&D',12:'S&T',10:'S',2:'T'};
  const LBLS=['0','T','S','S&T','S&D','Max'];

  const LBL_COLOR={'Max':'#b8860b','S&D':'#1a7a35','S&T':'#1a5c8a','S':'#1a3a6a','T':'#555555','0':'#c0392b'};

  // Build freq by label (always 5 fixed cols)
  function buildFreqLabeled(ranges){
    // ranges = [{fi,ti,map},...] — multiple ranges combined (for Total)
    const emptyLabeled=()=>Object.fromEntries(LBLS.map(l=>[l,0]));
    const players=data.members.map((name,p)=>{
      const cnt=emptyLabeled();
      let total=0;
      for(const {fi,ti,map} of ranges){
        const f=Math.max(0,fi), t=Math.min(n-1,ti);
        if(f>t||f>=n) continue;
        for(let i=f;i<=t;i++){
          const pts=data.points[p][i]-(i>0?data.points[p][i-1]:0);
          const lbl=map[pts];
          if(lbl) cnt[lbl]++; else cnt['0']++;
        }
        total+=data.points[p][t]-(f>0?data.points[p][f-1]:0);
      }
      return {name,color:PALETTE[p],cnt,total};
    }).filter(({name})=>!isVirtHidden(name));
    return {players,vals:LBLS};
  }

  const legend=`<div style="font-size:9px;color:#6c6c70;margin-bottom:8px;line-height:1.9">
    <span style="color:#c0392b;font-weight:bold">0</span> = Falsch &nbsp;·&nbsp;
    <span style="color:#555;font-weight:bold">T</span> = Tore einer Mannschaft korrekt &nbsp;·&nbsp;
    <span style="color:#1a3a6a;font-weight:bold">S</span> = Sieger korrekt &nbsp;·&nbsp;
    <span style="color:#1a5c8a;font-weight:bold">S&T</span> = Sieger &amp; Tore einer Mannschaft korrekt &nbsp;·&nbsp;
    <span style="color:#1a7a35;font-weight:bold">S&D</span> = Sieger &amp; Tordifferenz korrekt &nbsp;·&nbsp;
    <span style="color:#b8860b;font-weight:bold">Max</span> = Alles korrekt
  </div>`;

  const gsEnd=Math.min(71,n-1);
  const phases=[
    {label:'1–24',      ranges:[{fi:0,      ti:23,    map:GS_MAP}]},
    {label:'25–48',     ranges:[{fi:24,     ti:47,    map:GS_MAP}]},
    {label:`49–${Math.min(lastG,72)}`, ranges:[{fi:48,ti:gsEnd,  map:GS_MAP}]},
    {label:'FS',        ranges:[{fi:koFirst,ti:n-1,   map:FS_MAP}]},
    {label:'Total',     ranges:[{fi:0,      ti:gsEnd, map:GS_MAP},{fi:koFirst,ti:n-1,map:FS_MAP}]}
  ];

  const allFreqs=phases.map(t=>buildFreqLabeled(t.ranges));
  const phLookup=allFreqs.map(f=>{const m={};f.players.forEach(p=>{m[p.name]={cnt:p.cnt,total:p.total};});return m;});
  const totalPlayers=allFreqs[allFreqs.length-1].players;
  const sorted=[...totalPlayers].sort((a,b)=>b.total-a.total);

  // Group header row
  const phGrpHdr=phases.map((t,i)=>
    `<th colspan="${LBLS.length}" style="text-align:center;font-size:8.5px;color:#444;padding:2px 4px;${i>0?'border-left:2px solid rgba(0,0,0,0.18);':''}border-bottom:1px solid rgba(0,0,0,0.15)">${t.label}</th>`
  ).join('');

  // Label sub-header row
  const lblHdr=phases.map((_,i)=>LBLS.map(v=>
    `<th style="text-align:right;padding:1px 4px;font-size:8px;color:${LBL_COLOR[v]||'#888'};font-weight:bold;white-space:nowrap;${i>0&&v===LBLS[0]?'border-left:2px solid rgba(0,0,0,0.18);':''}">${v}</th>`
  ).join('')).join('');

  // Data rows
  let rnk=1;
  const trows=sorted.map((r,i)=>{
    if(i>0&&sorted[i-1].total!==r.total) rnk=i+1;
    const bg=rnk===1?'background:#fffbe6':rnk===2?'background:#f5f5f5':rnk===3?'background:#fff4ee':(i%2?'background:#f7f7f9':'');
    const cells=phLookup.map((ph,pi)=>{
      const pd=ph[r.name]||{cnt:{},total:0};
      return LBLS.map((v,vi)=>`<td style="text-align:right;padding:1px 5px;font-size:9px;color:${LBL_COLOR[v]||'#888'};${pi>0&&vi===0?'border-left:2px solid rgba(0,0,0,0.18);':''}">${pd.cnt[v]||'–'}</td>`).join('');
    }).join('');
    return `<tr style="${bg}">
      <td class="rank-num" style="width:16px;padding:1px 4px;font-size:9px">${rnk}</td>
      <td style="font-size:9px;white-space:nowrap;padding:1px 8px 1px 3px">
        <span style="display:inline-block;width:6px;height:6px;border-radius:1px;background:${r.color};margin-right:3px;vertical-align:middle"></span>${r.name}
      </td>${cells}</tr>`;
  }).join('');

  el.innerHTML=legend+
    `<div style="overflow-x:auto;margin-top:2px"><table class="ptable" style="width:auto;table-layout:auto;border-collapse:collapse">
      <thead>
        <tr><th colspan="2" style="border:none;padding:0"></th>${phGrpHdr}</tr>
        <tr>
          <th style="width:16px;color:#444;padding:1px 2px 1px 4px">#</th>
          <th style="color:#444;padding:1px 8px 1px 3px;text-align:left">Name</th>${lblHdr}
        </tr>
      </thead>
      <tbody>${trows}</tbody>
    </table></div>`;
}

// ── Tab 2: Häufigste Tipps per Spiel ─────────────────────────
function calcResultate(){
  const el=document.getElementById('resultate-body');
  if(!tipData){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px;">Bitte WM_Tipps CSV laden.</p>';return;}
  const fi=parseInt(document.getElementById('sel-von').value), ti=parseInt(document.getElementById('sel-bis').value);
  const gip=new Set(data.gameNames.slice(fi,ti+1));
  const byGame={};
  for(const row of tipData){
    if(!gip.has(row.spiel))continue;
    if(!byGame[row.spiel])byGame[row.spiel]={};
    if(!row.tipp)continue;
    if(!showFifa&&row.name===VIRT_FIFA)continue;
    if(!showMW  &&row.name===VIRT_MW)  continue;
    byGame[row.spiel][row.tipp]=(byGame[row.spiel][row.tipp]||[]); byGame[row.spiel][row.tipp].push(row.name);
  }
  // Resultat-Lookup nach Spielname
  const gameResultByName={};
  data.gameNames.forEach((n,i)=>{if(data.gameResults&&data.gameResults[i])gameResultByName[n]=data.gameResults[i];});

  const ordered=[...data.gameNames.slice(fi,ti+1)].reverse().filter(g=>byGame[g]);
  let html='<table class="ptable" style="table-layout:fixed;width:100%"><colgroup><col style="width:46px"><col style="width:60px"><col style="width:38px"><col></colgroup><thead><tr><th>Tipp</th><th>Anzahl</th><th>%</th><th>Spieler</th></tr></thead><tbody>';
  for(const game of ordered){
    const tips=Object.entries(byGame[game]).map(([tipp,names])=>({tipp,count:names.length,names})).sort((a,b)=>b.count-a.count);
    const total=tips.reduce((s,t)=>s+t.count,0)||1;
    const res=gameResultByName[game];
    html+=`<tr class="game-header"><td colspan="4">${game}${res?` <span style="color:#0d7040;font-weight:normal;margin-left:6px">: ${res}</span>`:''}  </td></tr>`;
    for(const t of tips){
      const pct=Math.round(t.count/total*100);
      const isCorrect=res&&t.tipp===res;
      html+=`<tr style="${isCorrect?'background:rgba(90,186,138,0.12);outline:1px solid rgba(90,186,138,0.35);':''}">
        <td style="color:${isCorrect?'#0d7040':'#3a3a3c'}">${t.tipp}${isCorrect?' ✓':''}</td>
        <td style="color:#3a3a3c;font-size:11px">${t.count}/${total}</td>
        <td style="color:#3a3a3c;font-size:11px">${pct}%</td>
        <td style="font-size:10px">${t.names.join(', ')}</td></tr>`;
    }
  }
  el.innerHTML=html+'</tbody></table>';
}

// ── Tab 3: Tipp-Frequenz ──────────────────────────────────────
function calcFrequenz(){
  const el=document.getElementById('frequenz-body');
  if(!tipData){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px;">Bitte WM_Tipps CSV laden.</p>';return;}

  const fi=parseInt(document.getElementById('sel-von').value);
  const ti=parseInt(document.getElementById('sel-bis').value);
  const norm = s => (s||'').trim().toLowerCase();

  // Normalize score direction when toggle is ON: always higher:lower
  function normScore(s){
    if(!freqNormalize) return s;
    const m=s.match(/^(\d+):(\d+)$/);
    if(!m) return s;
    const [a,b]=[parseInt(m[1]),parseInt(m[2])];
    return a>=b ? `${a}:${b}` : `${b}:${a}`;
  }

  // Update toggle visual
  const tog=document.getElementById('freq-normalize-toggle');
  if(tog){
    const track=document.getElementById('freq-toggle-track');
    const thumb=document.getElementById('freq-toggle-thumb');
    if(freqNormalize){
      track.style.background='#3a6a9a'; track.style.borderColor='#5a9aca';
      thumb.style.left='18px'; thumb.style.background='#fff';
    } else {
      track.style.background='#333'; track.style.borderColor='#555';
      thumb.style.left='2px'; thumb.style.background='#888';
    }
  }

  // Build valid game sets: composite (date+name) AND name-only fallback
  const validGames = new Set(), gip = new Set();
  for(let i=fi; i<=ti; i++){
    validGames.add(data.gameDates[i] + '|' + norm(data.gameNames[i]));
    gip.add(norm(data.gameNames[i]));
  }

  // Count tips from tipData
  const tipCount={};
  for(const row of tipData){
    const gameKey = row.datum + '|' + norm(row.spiel);
    if(!validGames.has(gameKey) && !gip.has(norm(row.spiel))) continue;
    if(!showFifa&&row.name===VIRT_FIFA)continue;
    if(!showMW  &&row.name===VIRT_MW)  continue;
    const t=normScore(row.tipp?.trim());
    if(t) tipCount[t]=(tipCount[t]||0)+1;
  }

  // Resultate aus tipData (Spalte I der CSV), gleiche Zählweise wie Tipps (pro Spieler pro Spiel)
  const resCount={};
  for(const row of tipData){
    const gameKey=row.datum+'|'+norm(row.spiel);
    if(!validGames.has(gameKey)&&!gip.has(norm(row.spiel)))continue;
    const r=normScore((row.resultat||'').trim());
    if(r) resCount[r]=(resCount[r]||0)+1;
  }

  // Anzahl Spiele pro Resultat (aus data.gameResults, 1× pro Spiel)
  const gameResCount={};
  if(data.gameResults){
    for(let i=fi;i<=ti;i++){
      const res=normScore((data.gameResults[i]||'').trim());
      if(res) gameResCount[res]=(gameResCount[res]||0)+1;
    }
  }

  // Merge all known scores
  const allScores=new Set([...Object.keys(tipCount),...Object.keys(resCount),...Object.keys(gameResCount)]);
  const totalTips=Object.values(tipCount).reduce((s,v)=>s+v,0);
  const totalResults=Object.values(resCount).reduce((s,v)=>s+v,0);
  let rows=[...allScores].map(score=>{
    const tips=tipCount[score]||0, results=resCount[score]||0;
    return {score, tips, results, games:gameResCount[score]||0,
      tips_pct: totalTips>0?tips/totalTips:0,
      results_pct: totalResults>0?results/totalResults:0};
  });

  // Sort
  const {col,dir}=freqSort;
  rows.sort((a,b)=>{
    const av=col==='score'?a.score:a[col]??0;
    const bv=col==='score'?b.score:b[col]??0;
    return typeof av==='string' ? dir*av.localeCompare(bv) : dir*(av-bv);
  });

  const numGames=ti-fi+1;
  const numResults=totalResults;

  // Score-Matrix: Spieler × Score
  function scoreOrder(s){const m=s.match(/^(\d+):(\d+)$/);if(!m)return 99999;const h=+m[1],a=+m[2];return(h+a)*100+(99-h);}
  const matrixScores=[...new Set(Object.keys(tipCount))].sort((a,b)=>scoreOrder(a)-scoreOrder(b));

  const pMatrix={};
  const pHit={};  // exact hits (no normalization): pHit[nm][exactTip]++
  if(data) data.members.filter(nm=>!isVirtHidden(nm)).forEach(nm=>{pMatrix[nm]={};pHit[nm]={};});
  for(const row of tipData){
    const gameKey=row.datum+'|'+norm(row.spiel);
    if(!validGames.has(gameKey)&&!gip.has(norm(row.spiel)))continue;
    if(!showFifa&&row.name===VIRT_FIFA)continue;
    if(!showMW  &&row.name===VIRT_MW)  continue;
    const pname=(row.name||'').trim();
    if(!pMatrix[pname])continue;
    const rawTip=(row.tipp||'').trim();
    const t=normScore(rawTip);
    if(!t)continue;
    pMatrix[pname][t]=(pMatrix[pname][t]||0)+1;
    // Treffer: exakter Tipp == exaktes Resultat (immer ohne Normalisierung)
    const rawRes=(row.resultat||'').trim();
    if(rawTip&&rawRes&&rawTip===rawRes){
      if(!pHit[pname]) pHit[pname]={};
      pHit[pname][rawTip]=(pHit[pname][rawTip]||0)+1;
    }
  }
  const members=data?[...data.members].filter(nm=>!isVirtHidden(nm)):[];
  members.sort((a,b)=>{
    const mc=matrixSort.col;
    if(mc==='_name') return matrixSort.dir*a.localeCompare(b,'de');
    const va=mc==='_total'?matrixScores.reduce((s,sc)=>s+((pMatrix[a]||{})[sc]||0),0):((pMatrix[a]||{})[mc]||0);
    const vb=mc==='_total'?matrixScores.reduce((s,sc)=>s+((pMatrix[b]||{})[sc]||0),0):((pMatrix[b]||{})[mc]||0);
    return va!==vb?matrixSort.dir*(va-vb):a.localeCompare(b,'de');
  });

  const BORDER='1px solid #d1d1d6';
  function matTh(label,col){
    const act=matrixSort.col===col;
    const arr=act?(matrixSort.dir===-1?' ↓':' ↑'):'';
    const isScore=col!=='_name'&&col!=='_total';
    const style=isScore
      ?`text-align:center;padding:1px 3px;font-size:8px;white-space:nowrap;border-right:${BORDER}`
      :col==='_name'?`text-align:left;padding:2px 6px 2px 2px;font-size:8px;border-right:${BORDER}`
      :`text-align:center;padding:2px 4px;font-size:8px`;
    return `<th onclick="sortMatrix('${col}')" class="sortable${act?' sort-'+(matrixSort.dir===-1?'desc':'asc'):''}" style="cursor:pointer;${style}">${label}${isScore?arr:`<span class="sort-arrow"></span>`}</th>`;
  }
  const hdrCells=matrixScores.map(s=>matTh(s,s)).join('');
  let matHtml=`<table id="freq-matrix-table" class="ptable" style="table-layout:auto;font-size:9px;white-space:nowrap;border-collapse:collapse;width:auto">
    <thead><tr>
      ${matTh('Spieler','_name')}${hdrCells}${matTh('Σ','_total')}
    </tr></thead><tbody>`;
  // Hilfsfunktion: Treffer für einen Spalten-Score (exakt, kein Normalisieren)
  function hitCount(nm,sc){
    const ph=pHit[nm]||{};
    // sc kann normalisiert sein (z.B. '1:2' steht für 1:2 und 2:1)
    // Wir zählen exakte Treffer für sc selbst + gespiegelten Score
    const [a,b]=sc.split(':').map(Number);
    let c=(ph[sc]||0);
    if(a!==b) c+=(ph[`${b}:${a}`]||0);
    return c;
  }
  members.forEach((nm,i)=>{
    const pm=pMatrix[nm]||{};
    const total=matrixScores.reduce((s,sc)=>s+(pm[sc]||0),0);
    const totalHit=matrixScores.reduce((s,sc)=>s+hitCount(nm,sc),0);
    const rowBg=i%2===0?'background:#f4f4f8':'';
    const cells=matrixScores.map(sc=>{
      const v=pm[sc]||0;
      const h=v>0?hitCount(nm,sc):0;
      const txt=v>0?(h>0?`${v}<span style="color:#c0392b;font-size:7px">(${h})</span>`:`${v}`):'';
      return `<td style="text-align:center;padding:0 3px;border-right:${BORDER}">${txt}</td>`;
    }).join('');
    const totalTxt=total?(totalHit>0?`${total}<span style="color:#c0392b;font-size:7px">(${totalHit})</span>`:`${total}`):'';
    matHtml+=`<tr style="${rowBg}">
      <td style="padding:0 6px 0 2px;white-space:nowrap;border-right:${BORDER}">${nm}</td>
      ${cells}
      <td style="text-align:center;padding:0 4px;font-weight:600">${totalTxt}</td>
    </tr>`;
  });
  matHtml+='</tbody></table>';

  el.innerHTML=`<p style="font-size:10px;color:#555;padding:3px 0 4px">
    ${numGames} Spiel${numGames>1?'e':''} · ${rows.length} verschiedene Scores · ${totalTips} Tipps total</p>
    <p style="font-size:9px;color:#888;padding:0 0 6px">Anzahl wie oft der Tipp abgegeben wurde · <span style="color:#c0392b">rote Zahl in Klammern</span> = wie oft der Tipp exakt eingetroffen ist</p>
    <div style="overflow-x:auto;display:inline-block;max-width:100%">${matHtml}</div>`;
}

function sortFrequenz(col){
  if(freqSort.col===col) freqSort.dir*=-1; else {freqSort.col=col; freqSort.dir=-1;}
  calcFrequenz();
}
function sortMatrix(col){
  if(matrixSort.col===col) matrixSort.dir*=-1;
  else { matrixSort.col=col; matrixSort.dir=col==='_name'?1:-1; }
  calcFrequenz();
}

let punkteChartInst=null, hoverPlayer=-1;
let _punkteHue=null, _punkteN=0;

function onHoverPlayer(i){
  hoverPlayer=i;
  if(!punkteChartInst)return;
  punkteChartInst.data.datasets.forEach((ds,idx)=>{ds.borderWidth=idx===i?4:0.6;});
  punkteChartInst.update('none');
}
function onLeavePlayer(){
  hoverPlayer=-1;
  if(!punkteChartInst)return;
  punkteChartInst.data.datasets.forEach(ds=>{ds.borderWidth=1.5;});
  punkteChartInst.update('none');
}

function calcPunkteverlauf(){
  if(!data)return;
  const N=data.members.length;
  _punkteN=N;

  const labels=data.gameNums.map((n,gi)=>`Spiel ${n}\n${(data.gameDates[gi]||'').slice(0,6)}`);
  const _hidden=getHiddenPlayers();
  // Selbe Reihenfolge + selbe PALETTE-Farben wie Rangverlauf
  const sortedMembers=[...data.members.map((name,p)=>({name,p}))].filter(({name})=>!_hidden.has(name)&&!isVirtHidden(name)).sort((a,b)=>a.name.localeCompare(b.name,'de'));
  const datasets=sortedMembers.map(({name,p})=>({
    label:name,
    data:data.points[p],
    borderColor:PALETTE[p]||'#888',
    backgroundColor:'transparent',
    borderWidth:1.5,
    pointRadius:0,
    tension:0.25,
  }));

  // Glow-Plugin: hover-Kurve stark hervorheben, andere abdunkeln
  const glowPlugin={
    id:'punkteGlow',
    beforeDatasetsDraw(chart){
      if(hoverPlayer===-1)return;
      chart.data.datasets.forEach((ds,idx)=>{
        if(!ds._orig) ds._orig=ds.borderColor;
        ds.borderColor = idx===hoverPlayer ? ds._orig : ds._orig+'28';
      });
    },
    afterDatasetsDraw(chart){
      // Farben immer wiederherstellen
      chart.data.datasets.forEach(ds=>{if(ds._orig){ds.borderColor=ds._orig;delete ds._orig;}});
      if(hoverPlayer===-1) return;
      // Hover-Linie schwarz drüber zeichnen
      const c=chart.ctx;
      const meta=chart.getDatasetMeta(hoverPlayer);
      if(!meta||!meta.data||meta.hidden)return;
      c.save();
      c.lineJoin='round'; c.lineCap='round';
      c.strokeStyle='#000000'; c.lineWidth=2; c.globalAlpha=1;
      c.beginPath();
      meta.data.forEach((pt,i)=>{i===0?c.moveTo(pt.x,pt.y):c.lineTo(pt.x,pt.y);});
      c.stroke();
      c.restore();
    }
  };

  if(punkteChartInst)punkteChartInst.destroy();
  const ctx=document.getElementById('punkteChart').getContext('2d');
  punkteChartInst=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:150},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(255,255,255,0.97)',titleColor:'#1c1c1e',bodyColor:'#6c6c70',
          callbacks:{
            title:items=>items[0].label.replace('\n',' '),
            label:c=>`${c.dataset.label}: ${c.raw} Pkt`
          }
        }
      },
      scales:{
        x:{ticks:{color:'#888',font:{size:8},maxRotation:90,minRotation:90},grid:{color:'rgba(0,0,0,0.07)'}},
        y:{ticks:{color:'#888',font:{size:9}},grid:{color:'rgba(0,0,0,0.06)'},
           title:{display:true,text:'Punkte (kumuliert)',color:'#555',font:{size:9}}}
      }
    },
    plugins:[glowPlugin]
  });

  renderPvFilter();
  applyPvFilter();
}

let vergleichSel = new Set(); // ausgewählte Spieler-Indices
let vergleichInited = false;

function vergleichInit(){
  if(!data||vergleichInited) return;
  vergleichInited=true;
  // Alle Spieler standardmässig ausgewählt (max. 6 für Übersicht)
  data.members.forEach((_,i)=>{ if(i<6) vergleichSel.add(i); });
  buildVergleichSpielerliste();
}

function buildVergleichSpielerliste(){
  const el=document.getElementById('vergleich-spieler');
  if(!el||!data) return;
  const sorted=[...data.members.map((n,i)=>({n,i}))].sort((a,b)=>a.n.localeCompare(b.n,'de'));
  el.innerHTML=sorted.map(({n,i})=>{
    const on=vergleichSel.has(i);
    return `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:2px 4px;border-radius:4px;
      background:${on?'rgba(58,106,154,0.3)':'transparent'};border:1px solid ${on?'#3a6a9a':'transparent'}">
      <input type="checkbox" ${on?'checked':''} onchange="vergleichToggle(${i},this.checked)"
        style="accent-color:#3a6a9a;cursor:pointer">
      <span style="font-size:10px;color:${on?'#fff':'#aaa'}">${n}</span>
    </label>`;
  }).join('');
}

function vergleichToggle(i, on){
  if(on) vergleichSel.add(i); else vergleichSel.delete(i);
  buildVergleichSpielerliste();
  calcVergleich();
}

function vergleichSelectAll(on){
  if(on) data.members.forEach((_,i)=>vergleichSel.add(i));
  else vergleichSel.clear();
  buildVergleichSpielerliste();
  calcVergleich();
}

function calcVergleich(){
  const el=document.getElementById('vergleich-body');
  if(!data||!tipData){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px">Bitte CSV laden.</p>';return;}
  vergleichInit();

  const fi=parseInt(document.getElementById('sel-von').value);
  const ti=parseInt(document.getElementById('sel-bis').value);
  const sel=[...vergleichSel].sort((a,b)=>a-b);

  if(sel.length===0){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px">Keinen Spieler ausgewählt.</p>';return;}

  // Tipp-Lookup: name → spiel → {tipp, punkte}
  const lookup={};
  for(const row of tipData){
    if(!lookup[row.name]) lookup[row.name]={};
    lookup[row.name][row.spiel]={tipp:row.tipp||'–', punkte:row.punkte??0};
  }

  // Rang nach jedem Spiel: data.ranks[p][gi]
  // Spiele
  const games=data.gameNames.slice(fi,ti+1);
  const nums =data.gameNums.slice(fi,ti+1);
  const dates=data.gameDates.slice(fi,ti+1);
  const results=(data.gameResults||[]).slice(fi,ti+1);

  // Kopfzeile — Spielerspalten direkt nach Resultat, alles fixed
  const gameColW=180, playerColW=110;
  let html=`<table class="ptable" style="table-layout:fixed;width:auto"><colgroup>
    <col style="width:26px"><col style="width:54px"><col style="width:${gameColW}px">`;
  sel.forEach(()=>html+=`<col style="width:${playerColW}px">`);
  html+=`</colgroup><thead><tr>
    <th style="text-align:center;color:#000">#</th>
    <th style="color:#000">Datum</th>
    <th style="color:#000">Spiel &amp; Resultat</th>`;
  sel.forEach(p=>{
    html+=`<th style="text-align:center;color:#6c6c70;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${data.members[p]}</th>`;
  });
  html+=`</tr></thead><tbody>`;

  games.forEach((game,gi)=>{
    const res=results[gi]||'';
    const resHtml=res?` <span style="color:#0d7040;font-weight:bold">${res}</span>`
                    :`<span style="color:#444"> –</span>`;
    html+=`<tr>
      <td style="color:#888;text-align:center;font-size:10px">${nums[gi]}</td>
      <td style="color:#444;font-size:10px;white-space:nowrap">${dates[gi]}</td>
      <td style="color:#000;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${game}${resHtml}</td>`;
    sel.forEach(p=>{
      const name=data.members[p];
      const entry=lookup[name]?.[game]||{tipp:'–',punkte:0};
      const correct=res&&entry.tipp===res;
      const partial=!correct&&entry.punkte>0;
      const tipColor=correct?'#0d7040':partial?'#a05010':'#fff';
      const rang=data.ranks[p]?.[fi+gi]??'–';
      html+=`<td style="text-align:center;padding:2px 4px">
        <span style="font-size:11px;font-weight:bold;color:${tipColor}">${entry.tipp}</span>
        <span style="font-size:9px;color:#0d7040;margin-left:3px">${entry.punkte>0?'+'+entry.punkte:''}</span>
        <span style="display:block;font-size:9px;color:#888;margin-top:1px">Rang ${rang}</span>
      </td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table>`;

  // Zusammenfassung pro Spieler
  html+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:8px;border-top:1px solid #d1d1d6">`;
  sel.forEach(p=>{
    const name=data.members[p];
    let pts=0, correct=0, partial=0;
    games.forEach((game,gi)=>{
      const res=results[gi]||'';
      const entry=lookup[name]?.[game]||{tipp:'–',punkte:0};
      pts+=entry.punkte;
      if(res&&entry.tipp===res) correct++;
      else if(entry.punkte>0) partial++;
    });
    const rangEnd=data.ranks[p]?.[ti]??'–';
    html+=`<div style="background:#0d1a2a;border:1px solid #1e3a5a;border-radius:6px;padding:6px 10px;font-size:10px">
      <div style="color:#6c6c70;font-weight:bold;margin-bottom:3px">${name}</div>
      <div style="color:#0d7040">✓ ${correct}× richtig</div>
      ${partial?`<div style="color:#e0b060">≈ ${partial}× Teiler</div>`:''}
      <div style="color:#000">${pts} Pkt. · Rang ${rangEnd}</div>
    </div>`;
  });
  html+=`</div>`;

  el.innerHTML=html;
}

  const bracket = document.getElementById('gruppe-kader');

function buildGruppen(){
  // Alle einzigartigen Spiele aus tipData sammeln
  const gameMap={};
  for(const row of tipData){
    const n=row.spiel; if(!n)continue;
    if(!gameMap[n]) gameMap[n]={datum:row.datum||'',resultat:''};
    if(row.resultat&&!gameMap[n].resultat) gameMap[n].resultat=row.resultat;
  }
  if(data.gameResults) data.gameNames.forEach((n,i)=>{if(data.gameResults[i]&&gameMap[n])gameMap[n].resultat=data.gameResults[i];});

  return WM_GRUPPEN.map(({l,teams})=>{
    const tset=new Set(teams);
    const spiele=Object.entries(gameMap)
      .filter(([name])=>{const p=name.split(' vs ');return p.length===2&&tset.has(p[0].trim())&&tset.has(p[1].trim());})
      .map(([name,g])=>({name,...g}))
      .sort((a,b)=>{
        const da=a.datum.split('.').reverse().join('');
        const db=b.datum.split('.').reverse().join('');
        return da.localeCompare(db)||a.name.localeCompare(b.name);
      });
    return {letter:l,teams,spiele};
  });
}

function gruppeStandings(teams,spiele){
  const s={};
  teams.forEach(t=>(s[t]={sp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  const h2h={}; // "t1§t2" → {pts1,pts2,gf1,gf2}
  const key=(a,b)=>a<b?a+'§'+b:b+'§'+a;

  for(const sp of spiele){
    if(!sp.resultat)continue;
    const p=sp.name.split(' vs '); if(p.length!==2)continue;
    const [t1,t2]=[p[0].trim(),p[1].trim()];
    if(!s[t1]||!s[t2])continue;
    const rp=sp.resultat.split(':'); if(rp.length!==2)continue;
    const g1=parseInt(rp[0]),g2=parseInt(rp[1]); if(isNaN(g1)||isNaN(g2))continue;
    s[t1].sp++;s[t2].sp++;
    s[t1].gf+=g1;s[t1].ga+=g2;
    s[t2].gf+=g2;s[t2].ga+=g1;
    let p1=0,p2=0;
    if(g1>g2){s[t1].w++;s[t2].l++;s[t1].pts+=3;p1=3;}
    else if(g2>g1){s[t2].w++;s[t1].l++;s[t2].pts+=3;p2=3;}
    else{s[t1].d++;s[t2].d++;s[t1].pts++;s[t2].pts++;p1=1;p2=1;}
    const k=key(t1,t2);
    if(!h2h[k])h2h[k]={};
    const inv=t1>t2;
    h2h[k].pts1=(h2h[k].pts1||0)+(inv?p2:p1);
    h2h[k].pts2=(h2h[k].pts2||0)+(inv?p1:p2);
    h2h[k].gf1=(h2h[k].gf1||0)+(inv?g2:g1);
    h2h[k].gf2=(h2h[k].gf2||0)+(inv?g1:g2);
  }
  teams.forEach(t=>{s[t].gd=s[t].gf-s[t].ga;});

  function h2hFor(a,b){
    const k=key(a,b),r=h2h[k]; if(!r)return null;
    const inv=a>b;
    return{pts_a:inv?r.pts2:r.pts1,pts_b:inv?r.pts1:r.pts2,gf_a:inv?r.gf2:r.gf1,gf_b:inv?r.gf1:r.gf2};
  }

  return Object.entries(s).map(([name,st])=>({name,...st})).sort((a,b)=>{
    if(a.pts!==b.pts)return b.pts-a.pts;
    // 1. H2H-Punkte
    const hh=h2hFor(a.name,b.name);
    if(hh){
      const dp=hh.pts_a-hh.pts_b; if(dp!==0)return -dp;
      // 2. H2H-Tordifferenz
      const dg=(hh.gf_a-hh.gf_b)-(hh.gf_b-hh.gf_a); if(dg!==0)return -Math.sign(dg);
      // 3. H2H-Tore
      if(hh.gf_a!==hh.gf_b)return hh.gf_b-hh.gf_a;
    }
    // 4. Gesamt-Tordifferenz
    if(a.gd!==b.gd)return b.gd-a.gd;
    // 5. Gesamt-Tore
    if(a.gf!==b.gf)return b.gf-a.gf;
    return a.name.localeCompare(b.name);
  });
}

  else { teamsSort.col=col; teamsSort.dir = col==='caps'?-1:1; teamsSort.dir = col==='caps'?-1:1; }
  renderGruppeKader();
}

function renderGruppeKader(){
  const el = document.getElementById('gruppe-kader');
  if(!el) return;
  if(!WM_KADER_DATA){ el.innerHTML=''; return; }

  const posOrd = {GK:0,DF:1,MF:2,FW:3};
  const posCol = {GK:'#e8a030',DF:'#0d7040',MF:'#6ab0e0',FW:'#e06060'};
  const posLbl = {GK:'Tor',DF:'Abwehr',MF:'Mittelfeld',FW:'Angriff'};
  const year   = new Date().getFullYear();
  const sc     = teamsSort.col;
  const sd     = teamsSort.dir;

  function arrow(col){
    if(sc!==col) return `<span style="color:#333;margin-left:2px">⇅</span>`;
    return `<span style="color:#aaa;margin-left:2px">${sd>0?'↑':'↓'}</span>`;
  }

  function sortedPlayers(raw){
    const byPos={};
    for(const p of raw){ const k=posOrd[p.pos]??9; (byPos[k]||(byPos[k]=[])).push(p); }
    const result=[];
    for(const k of Object.keys(byPos).sort((a,b)=>a-b)){
      byPos[k].sort((a,b)=>{
        if(sc==='name'){ const va=a.name.toLowerCase(),vb=b.name.toLowerCase(); return sd*(va<vb?-1:va>vb?1:0); }
        if(sc==='age') return sd*(a.jg-b.jg);
        if(sc==='club'){ const va=(a.club||'').toLowerCase(),vb=(b.club||'').toLowerCase(); return sd*(va<vb?-1:va>vb?1:0); }
        return sd*(b.caps-a.caps);
      });
      result.push(...byPos[k]);
    }
    return result;
  }

  // get team names from WM_GRUPPEN using the same group index as Gruppen-tab
  const wg = WM_GRUPPEN[selGruppe];
  if(!wg){ el.innerHTML=''; return; }
  const teamNames = wg.teams.slice().sort((a,b)=>a.localeCompare(b,'de'));

  let html = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px">`;
  for(const teamName of teamNames){
    const csvName = TEAM_CSV_NAME[teamName] || teamName;
    const players = sortedPlayers(WM_KADER_DATA[csvName]||[]);
    const info    = WM_TEAM_INFO[teamName]||{};
    const fifaStr = info.fifa ? `🌍 ${info.fifa}.` : '';
    const mvStr   = info.mv  ? ` · 💰 ${info.mv>=1000?(info.mv/1000).toFixed(2).replace('.',',')+'Mrd':info.mv+' Mio'} €` : '';
    html += `<div style="background:#ffffff;border:1px solid #d1d1d6;border-radius:6px;padding:8px;overflow:hidden">
      <div style="font-size:11px;font-weight:bold;color:#000;margin-bottom:2px">${teamName}</div>
      <div style="font-size:9px;color:#aaa;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #363638">${fifaStr}${mvStr}</div>
      <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid #111">
        <span onclick="teamsSetSort('name')" style="cursor:pointer;user-select:none;color:${sc==='name'?'#bbb':'#555'}">Name ${arrow('name')}</span>
        <span onclick="teamsSetSort('club')" style="cursor:pointer;user-select:none;color:${sc==='club'?'#bbb':'#555'}">Verein ${arrow('club')}</span>
        <span style="display:flex;gap:6px">
          <span onclick="teamsSetSort('age')" style="cursor:pointer;user-select:none;color:${sc==='age'?'#bbb':'#555'}">Alter ${arrow('age')}</span>
          <span onclick="teamsSetSort('caps')" style="cursor:pointer;user-select:none;color:${sc==='caps'?'#bbb':'#555'}">LS ${arrow('caps')}</span>
        </span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:10px">
        <colgroup><col style="width:auto"><col style="width:auto"><col style="width:22px"><col style="width:22px"></colgroup>`;
    let lastPos=null;
    for(const p of players){
      if(p.pos!==lastPos){
        html+=`<tr><td colspan="4" style="color:${posCol[p.pos]||'#888'};font-size:9px;font-weight:bold;padding:5px 0 2px;text-transform:uppercase;letter-spacing:.4px">${posLbl[p.pos]||p.pos}</td></tr>`;
        lastPos=p.pos;
      }
      html+=`<tr>
        <td style="color:#000;padding:1px 4px 1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</td>
        <td style="color:#000;padding:1px 4px 1px 0;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.club}${p.land?' ('+p.land+')':''}</td>
        <td style="color:#000;text-align:right;font-size:9px;padding-right:4px">${year-p.jg}</td>
        <td style="color:#000;text-align:right;font-size:9px">${p.caps}</td>
      </tr>`;
    }
    if(!players.length) html+=`<tr><td colspan="4" style="color:#aaa;font-size:10px">–</td></tr>`;
    html+=`</table></div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}
