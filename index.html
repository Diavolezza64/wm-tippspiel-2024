<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee;
         display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 185px; flex-shrink: 0; background: #16213e;
             display: flex; flex-direction: column; border-right: 1px solid #2a2a4a; }
  #sidebar-header { padding: 10px 10px 6px; font-size: 11px; color: #888;
    border-bottom: 1px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; }
  #reset-btn { font-size: 10px; background: #0f3460; border: none; color: #aaa;
               padding: 2px 7px; border-radius: 3px; cursor: pointer; }
  #reset-btn:hover { background: #1a4a80; color: #fff; }
  #player-list { overflow-y: auto; flex: 1; padding: 4px; }
  .player-item { display: flex; align-items: center; padding: 4px 6px; cursor: pointer;
    border-radius: 4px; margin-bottom: 2px; transition: background 0.1s; user-select: none; }
  .player-item:hover { background: #1e3a5f; }
  .player-item.active { background: #0f3460; outline: 1px solid rgba(255,255,255,0.4); }
  .color-swatch { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; margin-right: 7px; }
  .player-name { font-size: 11px; flex: 1; line-height: 1.3; }
  .player-rank { font-size: 10px; color: #888; padding-left: 4px; flex-shrink: 0; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; padding: 10px 12px 8px; min-width: 0; }
  .drop-zone { border: 2px dashed #3a3a6a; border-radius: 6px; padding: 6px 12px;
    text-align: center; cursor: pointer; font-size: 11px; color: #666; margin-bottom: 5px;
    flex-shrink: 0; transition: border-color 0.2s, color 0.2s; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4a9eff; color: #4a9eff; }
  .drop-zone.loaded { border-style: solid; border-color: #2a5a2a; color: #5c9a5c; cursor: default; }
  #chart-wrap { flex: 1; position: relative; min-height: 0; }
  canvas { position: absolute; inset: 0; }
  #hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
          color: #444; font-size: 14px; pointer-events: none; }

  /* Ranking panel */
  #ranking-toggle { display: none; background: #0f3460; border: none; color: #ccc;
    font-size: 12px; padding: 4px 12px; border-radius: 4px; cursor: pointer;
    margin-bottom: 5px; flex-shrink: 0; text-align: left; }
  #ranking-toggle:hover { background: #1a4a80; color: #fff; }
  #ranking-panel { display: none; background: #16213e; border-radius: 6px;
    flex-shrink: 0; max-height: 44vh; overflow: hidden; flex-direction: column; }
  #ranking-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 7px 12px 6px; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
  #ranking-controls label { font-size: 11px; color: #aaa; }
  #ranking-controls select { background: #0f3460; color: #eee; border: 1px solid #2a4a7a;
    border-radius: 4px; padding: 3px 6px; font-size: 11px; }
  #ranking-subtitle { font-size: 10px; color: #555; }
  .tab-bar { display: flex; gap: 2px; padding: 5px 12px 0; flex-shrink: 0; border-bottom: 1px solid #2a2a4a; }
  .tab-btn { font-size: 11px; padding: 4px 10px; border: none; cursor: pointer;
    border-radius: 4px 4px 0 0; background: #0a1628; color: #666; }
  .tab-btn.active { background: #16213e; color: #eee; }
  .tab-content { display: none; overflow-y: auto; flex: 1; padding: 8px 12px; }
  .tab-content.active { display: block; }
  .sub-tab-bar { display: flex; gap: 2px; margin-bottom: 8px; border-bottom: 1px solid #2a2a4a; }
  .sub-tab-btn { font-size: 10px; padding: 3px 10px; border: none; cursor: pointer;
    border-radius: 4px 4px 0 0; background: #0a1628; color: #666; }
  .sub-tab-btn.active { background: #1a2a4a; color: #eee; }

  /* Tables */
  .ptable { width: 100%; border-collapse: collapse; font-size: 11px; }
  .ptable th { text-align: left; color: #888; border-bottom: 1px solid #2a2a4a;
    padding: 3px 8px; font-weight: normal; position: sticky; top: 0; background: #16213e; }
  .ptable th.sortable { cursor: pointer; user-select: none; }
  .ptable th.sortable:hover { color: #ccc; }
  .ptable th .sort-arrow { margin-left: 3px; opacity: 0.4; }
  .ptable th.sort-asc .sort-arrow::after  { content: '▲'; opacity: 1; }
  .ptable th.sort-desc .sort-arrow::after { content: '▼'; opacity: 1; }
  .ptable th:not(.sort-asc):not(.sort-desc) .sort-arrow::after { content: '⇅'; }
  .ptable td { padding: 3px 8px; border-bottom: 1px solid #1a1a3a; }
  .ptable tr:hover td { background: #1e3a5f; }
  .rank-num { color: #888; width: 28px; }
  .rank-pts { font-weight: normal; color: #fff; text-align: right; }
  .export-btn { float: right; font-size: 10px; background: #1a3a1a; border: 1px solid #2a5a2a;
    color: #5c9a5c; padding: 2px 8px; border-radius: 3px; cursor: pointer; margin-left: 6px; }
  .export-btn:hover { background: #2a5a2a; color: #8aca8a; }
  /* ── Team-Hover-Popup ── */
  #team-popup {
    display:none; position:fixed; z-index:9999;
    background:#0d1b2a; border:1px solid #2a4a6a;
    border-radius:6px; padding:8px 10px;
    box-shadow:0 6px 24px rgba(0,0,0,.8);
    pointer-events:none;
    white-space:nowrap;
  }
  #team-popup table { width:100%; border-collapse:collapse; font-size:10px; }
  #team-popup th { color:#7090b0; font-size:9px; font-weight:normal; text-align:center; padding:2px; }
  #team-popup th:nth-child(2) { text-align:left; }
  #team-popup td { color:#ddd; text-align:center; padding:2px 3px; }
  #team-popup td:nth-child(2) { text-align:left; }
  #team-popup .pop-section { color:#6ab0e0; font-size:9px; font-weight:bold;
    letter-spacing:.5px; text-transform:uppercase; margin:8px 0 3px; }
  #team-popup .pop-title { font-size:12px; font-weight:bold; color:#fff; margin-bottom:6px; }
  #team-popup .pop-pos { font-size:9px; font-weight:bold; padding:4px 0 2px; text-transform:uppercase; }
  #team-popup tr:hover td { background:#1a2e45; }
  .tip-bar-wrap { background: #0a1628; border-radius: 3px; overflow: hidden;
    height: 10px; width: 100%; display: block; }
  .tip-bar { height: 100%; }
  .game-header td { background: #0f1e3a; font-weight: bold; color: #9ac; padding: 5px 8px; }
  .num-right { text-align: right; }
</style>
</head>
<body>
<div id="team-popup"></div>
<div id="sidebar">
  <div id="dz-rang" class="drop-zone" onclick="document.getElementById('fi-rang').click()" style="margin:6px 6px 3px;font-size:10px;padding:4px 8px">
    📂 WM_Rangverlauf CSV
    <input type="file" id="fi-rang" accept=".csv" style="display:none">
  </div>
  <div id="dz-tipps" class="drop-zone" style="display:none;margin:0 6px 3px;font-size:10px;padding:4px 8px" onclick="document.getElementById('fi-tipps').click()">
    📂 WM_Tipps CSV
    <input type="file" id="fi-tipps" accept=".csv" style="display:none">
  </div>
  <button id="ranking-toggle" onclick="toggleRanking()" style="margin:0 6px 4px;width:calc(100% - 12px)">📋 Details</button>
  <div id="sidebar-header">
    <span>Spieler</span>
    <button id="reset-btn" onclick="resetHighlight()">Alle</button>
  </div>
  <div id="player-list"><div style="color:#555;font-size:11px;padding:10px;">Daten laden …</div></div>
</div>

<div id="main">

  <div id="ranking-panel">
    <div id="ranking-controls">
      <label>Von <select id="sel-von" onchange="updateBisOptions(); refreshTabs()"></select></label>
      <label>Bis <select id="sel-bis" onchange="refreshTabs()"></select></label>
      <span id="ranking-subtitle"></span>
    </div>
    <div class="tab-bar" id="main-tab-bar">
      <button class="tab-btn active" onclick="switchTab('rangliste')">🏆 Rangliste</button>
      <button class="tab-btn" onclick="switchTab('punkte')">📈 Punkteverlauf</button>
      <button class="tab-btn" onclick="switchTab('resultate')">📊 Häufigste Tipps</button>
      <button class="tab-btn" onclick="switchTab('frequenz')">🔢 Tipp-Frequenz</button>
      <button class="tab-btn" onclick="switchTab('vergleich')">⚖️ Vergleich</button>
      <button class="tab-btn" onclick="switchTab('gruppen')">🗂 Gruppen</button>
    </div>
    <div id="tab-rangliste" class="tab-content active" style="overflow-y:auto">
      <div class="sub-tab-bar">
        <button class="sub-tab-btn active" onclick="switchRangliste('uebersicht')">📊 Übersicht</button>
        <button class="sub-tab-btn" onclick="switchRangliste('zeitraum')">📅 Zeitraum</button>
      </div>
      <div id="sub-uebersicht">
        <div id="ranking-phasen"></div>
      </div>
      <div id="sub-zeitraum" style="display:none;max-width:220px">
        <button class="export-btn" onclick="exportRankingCSV()" style="margin-bottom:6px">⬇ CSV</button>
        <table class="ptable" style="table-layout:fixed;width:100%">
          <thead><tr>
            <th style="width:18px">#</th>
            <th>Name</th>
            <th style="width:28px" class="num-right">Pkt</th>
          </tr></thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    </div>
    <div id="tab-punkte" class="tab-content">
      <div style="height:340px;position:relative;margin-bottom:8px">
        <canvas id="punkteChart"></canvas>
      </div>
      <div id="punkte-legend" style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0"></div>
    </div>
    <div id="tab-resultate" class="tab-content"><div id="resultate-body"></div></div>
    <div id="tab-frequenz" class="tab-content">
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:6px;flex-shrink:0">
        <span style="font-size:10px;color:#888">1:2 = 2:1 zusammenführen</span>
        <label style="display:inline-flex;align-items:center;cursor:pointer;position:relative;width:34px;height:18px">
          <input type="checkbox" id="freq-normalize-toggle" style="opacity:0;width:0;height:0;position:absolute"
            onchange="freqNormalize=this.checked;calcFrequenz()">
          <span id="freq-toggle-track" style="position:absolute;inset:0;border-radius:9px;background:#333;border:1px solid #555;transition:background 0.2s"></span>
          <span id="freq-toggle-thumb" style="position:absolute;left:2px;top:2px;width:12px;height:12px;border-radius:50%;background:#888;transition:left 0.2s,background 0.2s"></span>
        </label>
      </div>
      <div style="height:180px;position:relative;margin-bottom:8px;flex-shrink:0">
        <canvas id="freqChart"></canvas>
      </div>
      <div id="frequenz-body"></div>
    </div>
    <div id="tab-gruppen" class="tab-content">
      <div id="gruppe-pills" style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px"></div>
      <div style="display:flex;gap:16px;align-items:flex-start;overflow:auto;margin-bottom:16px">
        <div id="gruppe-tabelle" style="flex:0 0 310px;min-width:310px"></div>
        <div id="gruppe-spiele" style="flex:1;min-width:180px"></div>
      </div>
      <div id="gruppe-kader"></div>
    </div>
    <div id="tab-vergleich" class="tab-content">
      <div style="display:flex;gap:12px;height:100%;overflow:hidden">
        <!-- Spieler-Auswahl links: feste Höhe mit Scroll -->
        <div style="flex:0 0 150px;min-width:130px;display:flex;flex-direction:column;border-right:1px solid #1e2a3a;padding-right:10px">
          <div style="font-size:10px;font-weight:bold;color:#ddd;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;flex-shrink:0">Spieler</div>
          <div style="display:flex;gap:4px;margin-bottom:8px;flex-shrink:0">
            <button onclick="vergleichSelectAll(true)"  style="flex:1;font-size:9px;padding:2px 4px;background:#1e2a3a;color:#ddd;border:1px solid #2a3a4a;border-radius:3px;cursor:pointer">Alle</button>
            <button onclick="vergleichSelectAll(false)" style="flex:1;font-size:9px;padding:2px 4px;background:#1e2a3a;color:#ddd;border:1px solid #2a3a4a;border-radius:3px;cursor:pointer">Keine</button>
          </div>
          <div id="vergleich-spieler" style="display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1"></div>
        </div>
        <!-- Vergleichstabelle rechts -->
        <div style="flex:1;overflow:auto">
          <div id="vergleich-body"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="chart-wrap">
    <div id="hint">Daten werden geladen …</div>
    <canvas id="myChart" style="display:none"></canvas>
  </div>
</div>

<script>
const PALETTE = [
  '#1f77b4','#aec7e8','#ff7f0e','#ffbb78','#2ca02c','#98df8a','#d62728','#ff9896',
  '#9467bd','#c5b0d5','#8c564b','#c49c94','#e377c2','#f7b6d2','#7f7f7f','#c7c7c7',
  '#bcbd22','#dbdb8d','#17becf','#9edae5',
  '#393b79','#5254a3','#6b6ecf','#9c9ede','#637939','#8ca252','#b5cf6b','#cedb9c',
  '#8c6d31','#bd9e39','#e7ba52','#e7cb94'
];

let chart = null, freqChartInstance = null;
let activePlayer = null, data = null, tipData = null;
let currentTab = 'rangliste';
let freqSort = { col: 'tips', dir: -1 };   // -1 = desc
let freqNormalize = false;

// ── Startup: use embedded data if available ───────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (EMBEDDED_RANG) {
    data = EMBEDDED_RANG;
    if(!data.gameResults) data.gameResults = data.gameNames.map(()=>'');
    buildChart(); buildSidebar(); buildDropdowns();
    const dz = document.getElementById('dz-rang');
    dz.textContent = `✅ Eingebettete Daten — ${data.members.length} Spieler, ${data.gameNums.length} Spiele`;
    dz.classList.add('loaded'); dz.onclick = null;
    document.getElementById('ranking-toggle').style.display = 'block';
    document.getElementById('dz-tipps').style.display = 'block';
  } else {
    document.getElementById('hint').textContent = 'Bitte WM_Rangverlauf CSV laden';
  }
  if (EMBEDDED_TIPPS) {
    tipData = EMBEDDED_TIPPS;
    const dz = document.getElementById('dz-tipps');
    dz.textContent = `✅ Eingebettete Tipps — ${tipData.length} Einträge`;
    dz.classList.add('loaded'); dz.onclick = null;
  }
});

// ── Manual file loaders (fallback) ───────────────────────────
function setupDrop(dzId, inputId, handler) {
  const dz = document.getElementById(dzId), fi = document.getElementById(inputId);
  fi.addEventListener('change', e => e.target.files[0] && handler(e.target.files[0], dz));
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handler(e.dataTransfer.files[0], dz);
  });
}
setupDrop('dz-rang',  'fi-rang',  (f, dz) => readCSV(f, t => onRangverlauf(t, f.name, dz)));
setupDrop('dz-tipps', 'fi-tipps', (f, dz) => readCSV(f, t => onTipps(t, f.name, dz)));

function readCSV(file, cb) {
  const r = new FileReader();
  r.onload = e => cb(e.target.result);
  r.readAsText(file, 'utf-8');
}
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  return text.trim().split(/\r?\n/).map(l => l.split(';').map(c => c.trim().replace(/^"|"$/g, '')));
}

function onRangverlauf(text, filename, dz) {
  const [header, ...lines] = parseCSV(text);
  const members = [];
  for (let i = 3; i < header.length; i += 2) members.push(header[i].replace(' Rang','').trim());
  const gameNums=[], gameDates=[], gameNames=[];
  const ranks=members.map(()=>[]), points=members.map(()=>[]);
  for (const cols of lines) {
    if (!cols[0]?.trim()) continue;
    gameNums.push(parseInt(cols[0])); gameDates.push(cols[1]||''); gameNames.push(cols[2]||'');
    for (let p=0;p<members.length;p++) {
      ranks[p].push(parseInt(cols[3+p*2])||0); points[p].push(parseInt(cols[3+p*2+1])||0);
    }
  }
  data = { members, gameNums, gameDates, gameNames, gameResults: gameNames.map(()=>''), ranks, points };
  buildChart(); buildSidebar(); buildDropdowns();
  dz.textContent=`✅ ${filename}  —  ${members.length} Spieler, ${gameNums.length} Spiele`;
  dz.classList.add('loaded'); dz.onclick=null;
  document.getElementById('dz-tipps').style.display='block';
  document.getElementById('ranking-toggle').style.display='block';
}

function onTipps(text, filename, dz) {
  const [, ...lines] = parseCSV(text);
  tipData = lines.filter(c=>c[0]?.trim()).map(c=>({
    name:c[1], datum:c[3], spiel:c[6], tipp:c[7], resultat:c[8], punkte:parseInt(c[9])||0
  }));
  dz.textContent=`✅ ${filename}  —  ${tipData.length} Tipps`; dz.classList.add('loaded'); dz.onclick=null;
  if (currentTab==='resultate') calcResultate();
  if (currentTab==='frequenz') calcFrequenz();
}

// ── Chart ─────────────────────────────────────────────────────
function buildChart() {
  const {members,gameNums,gameDates,ranks,points}=data, N=members.length;
  const labels=gameNums.map((n,i)=>`Spiel ${n}\n${(gameDates[i]||'').slice(0,6)}`);
  const datasets=members.map((name,p)=>({
    label:name, data:ranks[p], borderColor:PALETTE[p], backgroundColor:PALETTE[p],
    borderWidth:1.8, pointRadius:4, pointHoverRadius:7, tension:0, fill:false, order:N-p
  }));
  if (chart) chart.destroy();
  document.getElementById('hint').style.display='none';
  const canvas=document.getElementById('myChart'); canvas.style.display='block';
  const rankLabelPlugin={id:'rankLabels',afterDatasetsDraw(ch){
    const ctx=ch.ctx;
    ch.data.datasets.forEach((ds,p)=>{
      const isActive=activePlayer===p, noneActive=activePlayer===null;
      if (!noneActive&&!isActive) return;
      const meta=ch.getDatasetMeta(p); if (meta.hidden) return;
      meta.data.forEach((pt,g)=>{
        ctx.save(); ctx.font=isActive?'bold 12px Arial':'9px Arial';
        ctx.fillStyle=isActive?PALETTE[p]:'rgba(180,180,180,0.55)';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(ds.data[g],pt.x,pt.y-(isActive?7:5)); ctx.restore();
      });
    });
  }};
  chart=new Chart(canvas.getContext('2d'),{type:'line',data:{labels,datasets},plugins:[rankLabelPlugin],options:{
    responsive:true,maintainAspectRatio:false,animation:{duration:250},
    scales:{
      y:{reverse:true,min:0.5,max:N+0.5,
        ticks:{stepSize:1,color:'#aaa',font:{size:10},callback:v=>Number.isInteger(v)?v:''},
        grid:{color:'rgba(255,255,255,0.08)'},title:{display:true,text:'Rang',color:'#aaa',font:{size:11}}},
      x:{ticks:{color:'#aaa',font:{size:9},maxRotation:90,minRotation:90},grid:{color:'rgba(255,255,255,0.06)'}}
    },
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,10,30,0.92)',
      titleColor:'#fff',bodyColor:'#ccc',borderColor:'#333',borderWidth:1,
      callbacks:{title:c=>c[0]?.label||'',label:c=>`  ${data.members[c.datasetIndex]}: Rang ${c.raw}   (${data.points[c.datasetIndex][c.dataIndex]} Pkt. kum.)`}}}
  }});
}

// ── Sidebar ───────────────────────────────────────────────────
function buildSidebar() {
  const {members,ranks}=data;
  const sorted=[...Array(members.length).keys()].sort((a,b)=>members[a].localeCompare(members[b]));
  const list=document.getElementById('player-list'); list.innerHTML='';
  for (const p of sorted){
    const div=document.createElement('div'); div.className='player-item'; div.dataset.idx=p;
    const fr=ranks[p].length?ranks[p][ranks[p].length-1]:'?';
    div.innerHTML=`<div class="color-swatch" style="background:${PALETTE[p]}"></div>
      <span class="player-name">${members[p]}</span><span class="player-rank">(${fr})</span>`;
    div.addEventListener('click',()=>toggleHighlight(p)); list.appendChild(div);
  }
}

// ── Highlight ─────────────────────────────────────────────────
function toggleHighlight(p){
  if (activePlayer===p){resetHighlight();return;} activePlayer=p;
  const N=data.members.length;
  chart.data.datasets.forEach((ds,i)=>{
    const a=i===p;
    ds.borderColor=ds.backgroundColor=a?PALETTE[i]:hexAlpha(PALETTE[i],0.07);
    ds.borderWidth=a?3:1; ds.pointRadius=a?(isMobile?2:3):(isMobile?0.5:1); ds.order=a?0:N;
  }); chart.update('none');
  document.querySelectorAll('.player-item').forEach(el=>el.classList.toggle('active',parseInt(el.dataset.idx)===p));
}
const isMobile = window.innerWidth < 768;
function resetHighlight(){
  activePlayer=null; const N=data?.members.length||0;
  chart?.data.datasets.forEach((ds,i)=>{ds.borderColor=ds.backgroundColor=PALETTE[i];ds.borderWidth=1.8;ds.pointRadius=isMobile?1:2;ds.order=N-i;});
  chart?.update('none'); document.querySelectorAll('.player-item').forEach(el=>el.classList.remove('active'));
}

// ── Panel & tabs ──────────────────────────────────────────────
function toggleRanking(){
  const panel=document.getElementById('ranking-panel');
  const chartWrap=document.getElementById('chart-wrap');
  const btn=document.getElementById('ranking-toggle');
  const isOpen=panel.style.display==='flex';
  if(isOpen){
    panel.style.display='none'; panel.style.flex=''; panel.style.maxHeight='';
    chartWrap.style.display=''; btn.textContent='📋 Rangliste / Tipps nach Zeitraum';
  } else {
    panel.style.display='flex'; panel.style.flex='1'; panel.style.maxHeight='none';
    chartWrap.style.display='none'; btn.textContent='✖ Panel schliessen';
  }
}
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('#main-tab-bar .tab-btn').forEach((b,i)=>b.classList.toggle('active',['rangliste','punkte','resultate','frequenz','vergleich','gruppen'][i]===name));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='rangliste') calcRanking();
  else if(name==='punkte') calcPunkteverlauf();
  else if(name==='resultate') calcResultate();
  else if(name==='gruppen') calcGruppen();
  else if(name==='vergleich') calcVergleich();
  else calcFrequenz();
}

// ── Dropdowns ─────────────────────────────────────────────────
function buildDropdowns(){
  const von=document.getElementById('sel-von'); von.innerHTML='';
  data.gameNums.forEach((n,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`Spiel ${n}  (${data.gameDates[i]})`;von.appendChild(o);});
  updateBisOptions(); refreshTabs();
}
function updateBisOptions(){
  const fromIdx=parseInt(document.getElementById('sel-von').value);
  const bis=document.getElementById('sel-bis'); const prev=parseInt(bis.value); bis.innerHTML='';
  data.gameNums.forEach((n,i)=>{
    if(i<fromIdx)return; const o=document.createElement('option'); o.value=i;
    o.textContent=`Spiel ${n}  (${data.gameDates[i]})`;
    if(i===prev||((isNaN(prev)||prev<fromIdx)&&i===data.gameNums.length-1))o.selected=true; bis.appendChild(o);
  });
}
function refreshTabs(){
  const fi=parseInt(document.getElementById('sel-von').value), ti=parseInt(document.getElementById('sel-bis').value);
  const v=data.gameNums[fi], b=data.gameNums[ti];
  document.getElementById('ranking-subtitle').textContent=v===b?`Spiel ${v}`:`Spiel ${v} – Spiel ${b}`;
  if(currentTab==='rangliste') calcRanking();
  else if(currentTab==='resultate') calcResultate();
  else if(currentTab==='gruppen'||currentTab==='punkte') return;
  else if(currentTab==='vergleich'){calcVergleich();return;}
  else calcFrequenz();
}

// ── Tab 1: Rangliste ──────────────────────────────────────────
function getRankingRows(){
  const fi=parseInt(document.getElementById('sel-von').value), ti=parseInt(document.getElementById('sel-bis').value);
  const rows=data.members.map((name,p)=>({name,color:PALETTE[p],
    points:data.points[p][ti]-(fi>0?data.points[p][fi-1]:0)}));
  rows.sort((a,b)=>b.points-a.points);
  let rank=1; rows.forEach((r,i)=>{if(i>0&&r.points<rows[i-1].points)rank=i+1;r.rank=rank;});
  return rows;
}

function roundFrac(v){
  if(!v||typeof v!=='string') return String(v??'?');
  const r=v.toLowerCase();
  if(r.includes('sechzehntel'))  return '1/16';
  if(r.includes('achtel'))       return '1/8';
  if(r.includes('viertel'))      return '1/4';
  if(r.startsWith('halbfinal')||r.includes('halbfinale')) return '1/2';
  if(r==='final'||r.includes('finale')) return '1/1';
  if(r.includes('sieger')||r.includes('winner')) return '🏆';
  if(r.includes('gruppe')||r.includes('vorrunde')) return 'GP';
  return v;  // Klartext zurückgeben (z.B. Ländername, Zahl)
}

function calcRanking(){
  const rows=getRankingRows();
  document.getElementById('ranking-body').innerHTML=rows.map(r=>{
    const bg=r.rank===1?'background:#c8920033':r.rank===2?'background:#88888828':r.rank===3?'background:#8a570028':'';
    return `<tr style="${bg}">
      <td class="rank-num" style="width:18px">${r.rank}</td>
      <td style="font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        <span style="display:inline-block;width:7px;height:7px;border-radius:1px;background:${r.color};margin-right:4px;vertical-align:middle;flex-shrink:0"></span>${r.name}
      </td>
      <td class="rank-pts" style="width:28px">${r.points}</td></tr>`;
  }).join('');

  const el=document.getElementById('ranking-phasen');
  const n=data.gameNums.length;
  if(n<2){el.innerHTML='';return;}

  const zusatz=(typeof ZUSATZ_DATA!=='undefined')?ZUSATZ_DATA:{};
  const lastG=data.gameNums[n-1]||n;

  // Phasen-Ranking berechnen (Spiel-Indizes, nicht Spielnummern)
  function phRanking(fromIdx,toIdx){
    const fi=Math.max(0,fromIdx), ti=Math.min(n-1,toIdx);
    if(fi>=n) return [];
    const pts=data.members.map((name,p)=>({name,color:PALETTE[p],
      points:data.points[p][ti]-(fi>0?data.points[p][fi-1]:0)}));
    pts.sort((a,b)=>b.points-a.points);
    let rank=1; pts.forEach((r,i)=>{if(i>0&&r.points<pts[i-1].points)rank=i+1;r.rank=rank;});
    return pts;
  }

  // Tabellen-Renderer — Spalten: # | Name | Pkt
  function tbl(label, rnk, extraFn){
    if(!rnk||!rnk.length) return `<div style="flex:1;min-width:175px"><div style="font-size:9.5px;font-weight:bold;color:#9ac;margin-bottom:5px">${label}</div><div style="color:#555;font-size:10px">–</div></div>`;
    const trows=rnk.map(r=>{
      const bg=r.rank===1?'background:#c8920033':r.rank===2?'background:#88888828':r.rank===3?'background:#8a570028':'';
      const extra=extraFn?extraFn(r.name):'';
      return `<tr style="${bg}">
        <td class="rank-num" style="width:18px">${r.rank}</td>
        <td style="font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          <span style="display:inline-block;width:7px;height:7px;border-radius:1px;background:${r.color};margin-right:4px;vertical-align:middle;flex-shrink:0"></span>${r.name}${extra}
        </td>
        <td class="rank-pts" style="width:28px">${r.points}</td>
      </tr>`;
    }).join('');
    return `<div style="flex:1;min-width:175px">
      <div style="font-size:9.5px;font-weight:bold;color:#9ac;margin-bottom:5px">${label}</div>
      <table class="ptable" style="width:100%;table-layout:fixed">
        <thead><tr>
          <th style="width:18px">#</th><th>Name</th>
          <th style="width:28px" class="num-right">Pkt</th>
        </tr></thead>
        <tbody>${trows}</tbody>
      </table>
    </div>`;
  }

  // Zusatzfragen-Antworten (nur anzeigen wenn Daten vorhanden)
  const zusatzKeys=Object.keys(zusatz).length>0
    ? Object.keys(Object.values(zusatz)[0]).filter(k=>k!=='punkte')
    : [];
  const hasZusatz=zusatzKeys.length>0;
  function zusatzExtra(name){
    if(!hasZusatz) return '';
    const z=zusatz[name]; if(!z) return '';
    const vals=zusatzKeys.map(k=>{
      const v=z[k]; if(v===undefined||v===null) return '?';
      if(typeof v==='string') return roundFrac(v);
      return String(v);
    });
    if(vals.every(v=>v==='?')) return '';  // alle unbekannt → nichts anzeigen
    return `<br><span style="font-size:8px;color:#fff;margin-left:11px">(${vals.join(';')})</span>`;
  }

  // Index-Grenze für Gruppenphase (Spielnummern 1-72, d.h. Index 0-71)
  const gpEnd=data.gameNums.findIndex(g=>g>72);
  const koFirst=gpEnd===-1?n:gpEnd;

  const p124  =phRanking(0,23);
  const p2548 =phRanking(24,47);
  const p4972 =phRanking(48,Math.min(71,n-1));
  const pFinal=phRanking(koFirst,n-1);
  const pTotal=phRanking(0,n-1);

  // Zusatzfragen: nach Total-Rang sortiert, Pkt = Bonuspunkte (0 wenn keine Daten)
  const zusatzRnk=pTotal.map(r=>({...r,
    points:hasZusatz?(zusatz[r.name]?.punkte??0):0}));

  const zusatzLabel=`Zusatzfragen<br><span style="font-size:8px;color:#667">(WM;CH;T-CH;T-K;0-0)</span>`;

  el.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">`+
    tbl('Spiele 1–24',p124)+
    tbl('Spiele 25–48',p2548)+
    tbl(`Spiele 49–${Math.min(lastG,72)}`,p4972)+
    tbl('Finalspiele',pFinal)+
    tbl(zusatzLabel,zusatzRnk,hasZusatz?zusatzExtra:null)+
    tbl('Total',pTotal)+
    `</div>`;
}

// ── Tab 2: Häufigste Tipps per Spiel ─────────────────────────
function calcResultate(){
  const el=document.getElementById('resultate-body');
  if(!tipData){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px;">Bitte WM_Tipps CSV laden.</p>';return;}
  const fi=parseInt(document.getElementById('sel-von').value), ti=parseInt(document.getElementById('sel-bis').value);
  const gip=new Set(data.gameNames.slice(fi,ti+1));
  const byGame={};
  for(const row of tipData){
    if(!gip.has(row.spiel))continue;
    if(!byGame[row.spiel])byGame[row.spiel]={};
    if(!row.tipp)continue;
    byGame[row.spiel][row.tipp]=(byGame[row.spiel][row.tipp]||[]); byGame[row.spiel][row.tipp].push(row.name);
  }
  // Resultat-Lookup nach Spielname
  const gameResultByName={};
  data.gameNames.forEach((n,i)=>{if(data.gameResults&&data.gameResults[i])gameResultByName[n]=data.gameResults[i];});

  const ordered=[...data.gameNames.slice(fi,ti+1)].reverse().filter(g=>byGame[g]);
  let html='<table class="ptable"><thead><tr><th>Spiel</th><th>Tipp</th><th>Anzahl</th><th>Spieler</th></tr></thead><tbody>';
  for(const game of ordered){
    const tips=Object.entries(byGame[game]).map(([tipp,names])=>({tipp,count:names.length,names})).sort((a,b)=>b.count-a.count);
    const max=tips[0]?.count||1;
    const res=gameResultByName[game];
    html+=`<tr class="game-header"><td colspan="4">${game}${res?` <span style="color:#5aba8a;font-weight:normal;margin-left:6px">: ${res}</span>`:''}  </td></tr>`;
    for(const t of tips){
      const pct=Math.round(t.count/max*100);
      const isCorrect=res&&t.tipp===res;
      html+=`<tr style="${isCorrect?'background:rgba(90,186,138,0.12);outline:1px solid rgba(90,186,138,0.35);':''}">
        <td></td>
        <td style="font-weight:bold;color:${isCorrect?'#5aba8a':'#eee'}">${t.tipp}${isCorrect?' ✓':''}</td>
        <td><span class="tip-bar-wrap" style="display:inline-block;width:60px;vertical-align:middle"><span class="tip-bar" style="width:${pct}%;background:${isCorrect?'#3a9a6a':'#3a6a9a'};display:block;height:10px"></span></span>
        <span style="margin-left:5px;color:#aaa">${t.count}×</span></td>
        <td style="color:#777;font-size:10px">${t.names.join(', ')}</td></tr>`;
    }
  }
  el.innerHTML=html+'</tbody></table>';
}

// ── Tab 3: Tipp-Frequenz ──────────────────────────────────────
function calcFrequenz(){
  const el=document.getElementById('frequenz-body');
  if(!tipData){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px;">Bitte WM_Tipps CSV laden.</p>';return;}

  const fi=parseInt(document.getElementById('sel-von').value);
  const ti=parseInt(document.getElementById('sel-bis').value);
  const norm = s => (s||'').trim().toLowerCase();

  // Normalize score direction when toggle is ON: always higher:lower
  function normScore(s){
    if(!freqNormalize) return s;
    const m=s.match(/^(\d+):(\d+)$/);
    if(!m) return s;
    const [a,b]=[parseInt(m[1]),parseInt(m[2])];
    return a>=b ? `${a}:${b}` : `${b}:${a}`;
  }

  // Update toggle visual
  const tog=document.getElementById('freq-normalize-toggle');
  if(tog){
    const track=document.getElementById('freq-toggle-track');
    const thumb=document.getElementById('freq-toggle-thumb');
    if(freqNormalize){
      track.style.background='#3a6a9a'; track.style.borderColor='#5a9aca';
      thumb.style.left='18px'; thumb.style.background='#fff';
    } else {
      track.style.background='#333'; track.style.borderColor='#555';
      thumb.style.left='2px'; thumb.style.background='#888';
    }
  }

  // Build valid game sets: composite (date+name) AND name-only fallback
  const validGames = new Set(), gip = new Set();
  for(let i=fi; i<=ti; i++){
    validGames.add(data.gameDates[i] + '|' + norm(data.gameNames[i]));
    gip.add(norm(data.gameNames[i]));
  }

  // Count tips from tipData
  const tipCount={};
  for(const row of tipData){
    const gameKey = row.datum + '|' + norm(row.spiel);
    if(!validGames.has(gameKey) && !gip.has(norm(row.spiel))) continue;
    const t=normScore(row.tipp?.trim());
    if(t) tipCount[t]=(tipCount[t]||0)+1;
  }

  // Resultate aus tipData (Spalte I der CSV), gleiche Zählweise wie Tipps (pro Spieler pro Spiel)
  const resCount={};
  for(const row of tipData){
    const gameKey=row.datum+'|'+norm(row.spiel);
    if(!validGames.has(gameKey)&&!gip.has(norm(row.spiel)))continue;
    const r=normScore((row.resultat||'').trim());
    if(r) resCount[r]=(resCount[r]||0)+1;
  }

  // Anzahl Spiele pro Resultat (aus data.gameResults, 1× pro Spiel)
  const gameResCount={};
  if(data.gameResults){
    for(let i=fi;i<=ti;i++){
      const res=normScore((data.gameResults[i]||'').trim());
      if(res) gameResCount[res]=(gameResCount[res]||0)+1;
    }
  }

  // Merge all known scores
  const allScores=new Set([...Object.keys(tipCount),...Object.keys(resCount),...Object.keys(gameResCount)]);
  let rows=[...allScores].map(score=>({score, tips:tipCount[score]||0, results:resCount[score]||0, games:gameResCount[score]||0}));

  // Sort
  const {col,dir}=freqSort;
  rows.sort((a,b)=>{
    const av=col==='score'?a.score:col==='tips'?a.tips:col==='games'?a.games:a.results;
    const bv=col==='score'?b.score:col==='tips'?b.tips:col==='games'?b.games:b.results;
    return typeof av==='string' ? dir*av.localeCompare(bv) : dir*(av-bv);
  });

  const numGames=ti-fi+1;
  const numResults=Object.values(resCount).reduce((s,v)=>s+v,0);

  // ── Bar chart ────────────────────────────────────────────────
  // Sort by tips desc for chart (independent of table sort)
  const chartRows=[...rows].sort((a,b)=>b.tips-a.tips);
  const labels=chartRows.map(r=>r.score);
  const tipVals=chartRows.map(r=>r.tips);
  const resVals=chartRows.map(r=>r.results);

  if(freqChartInstance) freqChartInstance.destroy();
  const ctx=document.getElementById('freqChart').getContext('2d');
  const barLabelsPlugin={
    id:'barLabels',
    afterDatasetsDraw(chart){
      const c=chart.ctx, bot=chart.scales.y.getPixelForValue(0);
      chart.data.datasets.forEach((ds,di)=>{
        chart.getDatasetMeta(di).data.forEach((bar,i)=>{
          const v=ds.data[i]; if(!v) return;
          const bh=bot-bar.y;
          c.save();
          c.font=`bold ${bh>16?9:8}px sans-serif`;
          c.textAlign='center';
          if(bh>16){
            c.fillStyle='#fff'; c.textBaseline='bottom';
            c.fillText(v, bar.x, bot-3);
          } else {
            c.fillStyle='#ccc'; c.textBaseline='bottom';
            c.fillText(v, bar.x, bar.y-2);
          }
          c.restore();
        });
      });
    }
  };
  freqChartInstance=new Chart(ctx,{
    type:'bar',
    data:{labels, datasets:[
      {label:'Tipps',    data:tipVals, backgroundColor:'rgba(58,106,154,0.85)', borderColor:'#3a6a9a', borderWidth:1},
      {label:'Resultate',data:resVals, backgroundColor:'rgba(42,130,90,0.85)',  borderColor:'#2a825a', borderWidth:1}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false, animation:{duration:200},
      scales:{
        x:{ticks:{color:'#aaa',font:{size:9},maxRotation:45},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{ticks:{color:'#aaa',font:{size:9},stepSize:1},grid:{color:'rgba(255,255,255,0.08)'},
           title:{display:true,text:'Anzahl',color:'#666',font:{size:9}}}
      },
      plugins:{
        legend:{labels:{color:'#aaa',font:{size:10},boxWidth:12}},
        tooltip:{backgroundColor:'rgba(10,10,30,0.92)',titleColor:'#fff',bodyColor:'#ccc',
          callbacks:{label:c=>`${c.dataset.label}: ${c.raw}×`}}
      }
    },
    plugins:[barLabelsPlugin]
  });

  // ── Table ────────────────────────────────────────────────────
  function th(label,colName,align='left'){
    let cls='sortable';
    if(freqSort.col===colName) cls+=' sort-'+(freqSort.dir===-1?'desc':'asc');
    return `<th class="${cls}" style="text-align:${align}" onclick="sortFrequenz('${colName}')">${label}<span class="sort-arrow"></span></th>`;
  }

  let html=`<p style="font-size:10px;color:#555;padding:3px 0 7px">
    ${numGames} Spiel${numGames>1?'e':''} · ${rows.length} verschiedene Scores · ${numResults} Resultat-Einträge (${numGames} Spiele × Spieler)</p>
    <table class="ptable" style="table-layout:fixed"><colgroup>
      <col style="width:80px"><col style="width:110px"><col style="width:100px"><col style="width:80px">
    </colgroup><thead><tr>
      ${th('Tipp / Resultat','score','left')}
      ${th('Anzahl Tipps','tips','right')}
      ${th('Resultate','results','right')}
      ${th('Spiele','games','right')}
    </tr></thead><tbody>`;

  rows.forEach(r=>{
    html+=`<tr>
      <td style="font-weight:bold;color:#eee;letter-spacing:1px">${r.score}</td>
      <td style="color:#7aacda;text-align:right;padding-right:8px">${r.tips>0?r.tips+'×':'-'}</td>
      <td style="color:#5aba8a;text-align:right;padding-right:8px">${r.results>0?r.results+'×':'-'}</td>
      <td style="color:#a0c0a0;text-align:right;font-size:10px">${r.games>0?r.games+'×':'-'}</td>
    </tr>`;
  });

  el.innerHTML=html+'</tbody></table>';
}

function sortFrequenz(col){
  if(freqSort.col===col) freqSort.dir*=-1; else {freqSort.col=col; freqSort.dir=-1;}
  calcFrequenz();
}

function hexAlpha(hex,a){

// ── Tab 3: Punkteverlauf ──────────────────────────────────────
let punkteChartInst=null, hoverPlayer=-1;
let _punkteHue=null, _punkteN=0;

function onHoverPlayer(i){
  hoverPlayer=i;
  if(!punkteChartInst)return;
  punkteChartInst.data.datasets.forEach((ds,idx)=>{ds.borderWidth=idx===i?4:0.6;});
  punkteChartInst.update('none');
}
function onLeavePlayer(){
  hoverPlayer=-1;
  if(!punkteChartInst)return;
  punkteChartInst.data.datasets.forEach(ds=>{ds.borderWidth=1.5;});
  punkteChartInst.update('none');
}

function calcPunkteverlauf(){
  if(!data)return;
  const el=document.getElementById('punkte-legend');
  const N=data.members.length;
  _punkteN=N;
  const hue=i=>Math.round(i*360/N);
  _punkteHue=hue;
  const col=(i,a=1)=>`hsla(${hue(i)},70%,55%,${a})`;

  const labels=data.gameNums.map((n,gi)=>`Spiel ${n}\n${(data.gameDates[gi]||'').slice(0,6)}`);
  // Alphabetisch sortiert — Farbe und Dataset-Index folgen der Sortierung
  const sortedMembers=[...data.members.map((name,p)=>({name,p}))].sort((a,b)=>a.name.localeCompare(b.name,'de'));
  const datasets=sortedMembers.map(({name,p},si)=>({
    label:name,
    data:data.points[p],
    borderColor:col(si),
    backgroundColor:'transparent',
    borderWidth:1.5,
    pointRadius:0,
    tension:0.25,
  }));

  // Glow-Plugin: hover-Kurve stark hervorheben, andere abdunkeln
  const glowPlugin={
    id:'punkteGlow',
    beforeDatasetsDraw(chart){
      if(hoverPlayer===-1)return;
      // Alle nicht-hover Datasets auf sehr niedrige Deckkraft setzen
      chart.data.datasets.forEach((ds,idx)=>{
        ds._savedColor=ds._savedColor||ds.borderColor;
        ds.borderColor = idx===hoverPlayer ? ds._savedColor : ds._savedColor.replace(/,[\d.]+\)$/,',0.12)').replace(/hsla\(([^,]+),([^,]+),([^,]+),[\d.]+\)/,(_,h,s,l)=>`hsla(${h},${s},${l},0.10)`);
      });
    },
    afterDatasetsDraw(chart){
      if(hoverPlayer===-1){
        // Farben wiederherstellen
        chart.data.datasets.forEach(ds=>{if(ds._savedColor){ds.borderColor=ds._savedColor;delete ds._savedColor;}});
        return;
      }
      const c=chart.ctx;
      const meta=chart.getDatasetMeta(hoverPlayer);
      if(!meta||!meta.data||meta.hidden)return;
      const ds=chart.data.datasets[hoverPlayer];
      const color=ds._savedColor||ds.borderColor;
      c.save();
      // Breiter Glow-Halo
      c.shadowColor=color; c.shadowBlur=40;
      c.strokeStyle=color; c.lineWidth=6;
      c.lineJoin='round'; c.globalAlpha=0.4;
      c.beginPath();
      meta.data.forEach((pt,i)=>{i===0?c.moveTo(pt.x,pt.y):c.lineTo(pt.x,pt.y);});
      c.stroke();
      // Scharfe Hauptlinie
      c.shadowBlur=12; c.lineWidth=3.5; c.globalAlpha=1;
      c.beginPath();
      meta.data.forEach((pt,i)=>{i===0?c.moveTo(pt.x,pt.y):c.lineTo(pt.x,pt.y);});
      c.stroke();
      // Punkte an jedem Datenpunkt
      c.shadowBlur=8; c.fillStyle=color;
      meta.data.forEach(pt=>{c.beginPath();c.arc(pt.x,pt.y,3,0,Math.PI*2);c.fill();});
      c.restore();
      // Farben wiederherstellen
      chart.data.datasets.forEach(ds=>{if(ds._savedColor){ds.borderColor=ds._savedColor;delete ds._savedColor;}});
    }
  };

  if(punkteChartInst)punkteChartInst.destroy();
  const ctx=document.getElementById('punkteChart').getContext('2d');
  punkteChartInst=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:150},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(10,10,30,0.92)',titleColor:'#fff',bodyColor:'#ccc',
          callbacks:{
            title:items=>items[0].label.replace('\n',' '),
            label:c=>`${c.dataset.label}: ${c.raw} Pkt`
          }
        }
      },
      scales:{
        x:{ticks:{color:'#888',font:{size:8},maxRotation:90,minRotation:90},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#888',font:{size:9}},grid:{color:'rgba(255,255,255,0.07)'},
           title:{display:true,text:'Punkte (kumuliert)',color:'#555',font:{size:9}}}
      }
    },
    plugins:[glowPlugin]
  });

  // Legende — alphabetisch, Farbe und Hover-Index = sortierter Index si
  el.innerHTML=sortedMembers.map(({name},si)=>`
    <span onmouseenter="onHoverPlayer(${si})" onmouseleave="onLeavePlayer()"
      style="cursor:default;padding:2px 7px;border-radius:10px;font-size:10px;
        border:1px solid ${col(si,0.5)};color:${col(si)};background:transparent">${name}</span>`).join('');
}

// ── Tab 6: Vergleich ──────────────────────────────────────────
let vergleichSel = new Set(); // ausgewählte Spieler-Indices
let vergleichInited = false;

function vergleichInit(){
  if(!data||vergleichInited) return;
  vergleichInited=true;

function buildVergleichSpielerliste(){

function vergleichToggle(i, on){

function vergleichSelectAll(on){

function calcVergleich(){
  const el=document.getElementById('vergleich-body');
  if(!data||!tipData){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px">Bitte CSV laden.</p>';return;}
  vergleichInit();

  const fi=parseInt(document.getElementById('sel-von').value);
  const ti=parseInt(document.getElementById('sel-bis').value);
  const sel=[...vergleichSel].sort((a,b)=>a-b);

  if(sel.length===0){el.innerHTML='<p style="color:#555;font-size:11px;padding:8px">Keinen Spieler ausgewählt.</p>';return;}

  // Tipp-Lookup: name → spiel → {tipp, punkte}
  const lookup={};
  for(const row of tipData){
    if(!lookup[row.name]) lookup[row.name]={};
    lookup[row.name][row.spiel]={tipp:row.tipp||'–', punkte:row.punkte??0};
  }

  // Rang nach jedem Spiel: data.ranks[p][gi]
  // Spiele
  const games=data.gameNames.slice(fi,ti+1);
  const nums =data.gameNums.slice(fi,ti+1);
  const dates=data.gameDates.slice(fi,ti+1);
  const results=(data.gameResults||[]).slice(fi,ti+1);

  // Kopfzeile — Spielerspalten direkt nach Resultat, alles fixed
  const gameColW=180, playerColW=110;
  let html=`<table class="ptable" style="table-layout:fixed;width:auto"><colgroup>
    <col style="width:26px"><col style="width:54px"><col style="width:${gameColW}px">`;
  sel.forEach(()=>html+=`<col style="width:${playerColW}px">`);
  html+=`</colgroup><thead><tr>
    <th style="text-align:center;color:#fff">#</th>
    <th style="color:#fff">Datum</th>
    <th style="color:#fff">Spiel &amp; Resultat</th>`;
  sel.forEach(p=>{
    html+=`<th style="text-align:center;color:#9ac;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${data.members[p]}</th>`;
  });
  html+=`</tr></thead><tbody>`;

  games.forEach((game,gi)=>{
    const res=results[gi]||'';
    const resHtml=res?` <span style="color:#5aba8a;font-weight:bold">${res}</span>`
                    :`<span style="color:#444"> –</span>`;
    html+=`<tr>
      <td style="color:#888;text-align:center;font-size:10px">${nums[gi]}</td>
      <td style="color:#bbb;font-size:10px;white-space:nowrap">${dates[gi]}</td>
      <td style="color:#fff;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${game}${resHtml}</td>`;
    sel.forEach(p=>{
      const name=data.members[p];
      const entry=lookup[name]?.[game]||{tipp:'–',punkte:0};
      const correct=res&&entry.tipp===res;
      const partial=!correct&&entry.punkte>0;
      const tipColor=correct?'#5aba8a':partial?'#e0b060':'#fff';
      const rang=data.ranks[p]?.[fi+gi]??'–';
      html+=`<td style="text-align:center;padding:2px 4px">
        <span style="font-size:11px;font-weight:bold;color:${tipColor}">${entry.tipp}</span>

        <span style="display:block;font-size:9px;color:#888;margin-top:1px">Rang ${rang}</span>
      </td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table>`;

  // Zusammenfassung pro Spieler
  html+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:8px;border-top:1px solid #1e2a3a">`;
  sel.forEach(p=>{
    const name=data.members[p];
    let pts=0, correct=0, partial=0;
    games.forEach((game,gi)=>{
      const res=results[gi]||'';
      const entry=lookup[name]?.[game]||{tipp:'–',punkte:0};
      pts+=entry.punkte;
      if(res&&entry.tipp===res) correct++;
      else if(entry.punkte>0) partial++;
    });
    const rangEnd=data.ranks[p]?.[ti]??'–';
    html+=`<div style="background:#0d1a2a;border:1px solid #1e3a5a;border-radius:6px;padding:6px 10px;font-size:10px">
      <div style="color:#9ac;font-weight:bold;margin-bottom:3px">${name}</div>
      <div style="color:#5aba8a">✓ ${correct}× richtig</div>
      ${partial?`<div style="color:#e0b060">≈ ${partial}× Teiler</div>`:''}
      <div style="color:#fff">${pts} Pkt. · Rang ${rangEnd}</div>
    </div>`;
  });
  html+=`</div>`;

  el.innerHTML=html;
}

function buildGruppen(){
  // Alle einzigartigen Spiele aus tipData sammeln
  const gameMap={};
  for(const row of tipData){
    const n=row.spiel; if(!n)continue;
    if(!gameMap[n]) gameMap[n]={datum:row.datum||'',resultat:''};
    if(row.resultat&&!gameMap[n].resultat) gameMap[n].resultat=row.resultat;
  }
  if(data.gameResults) data.gameNames.forEach((n,i)=>{if(data.gameResults[i]&&gameMap[n])gameMap[n].resultat=data.gameResults[i];});

  return WM_GRUPPEN.map(({l,teams})=>{
    const tset=new Set(teams);
    const spiele=Object.entries(gameMap)
      .filter(([name])=>{const p=name.split(' vs ');return p.length===2&&tset.has(p[0].trim())&&tset.has(p[1].trim());})
      .map(([name,g])=>({name,...g}))
      .sort((a,b)=>{
        const da=a.datum.split('.').reverse().join('');
        const db=b.datum.split('.').reverse().join('');
        return da.localeCompare(db)||a.name.localeCompare(b.name);
      });
    return {letter:l,teams,spiele};
  });
}

function gruppeStandings(teams,spiele){
  const s={};
  teams.forEach(t=>(s[t]={sp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}));
  const h2h={}; // "t1§t2" → {pts1,pts2,gf1,gf2}
  const key=(a,b)=>a<b?a+'§'+b:b+'§'+a;

  for(const sp of spiele){
    if(!sp.resultat)continue;
    const p=sp.name.split(' vs '); if(p.length!==2)continue;
    const [t1,t2]=[p[0].trim(),p[1].trim()];
    if(!s[t1]||!s[t2])continue;
    const rp=sp.resultat.split(':'); if(rp.length!==2)continue;
    const g1=parseInt(rp[0]),g2=parseInt(rp[1]); if(isNaN(g1)||isNaN(g2))continue;
    s[t1].sp++;s[t2].sp++;
    s[t1].gf+=g1;s[t1].ga+=g2;
    s[t2].gf+=g2;s[t2].ga+=g1;
    let p1=0,p2=0;
    if(g1>g2){s[t1].w++;s[t2].l++;s[t1].pts+=3;p1=3;}
    else if(g2>g1){s[t2].w++;s[t1].l++;s[t2].pts+=3;p2=3;}
    else{s[t1].d++;s[t2].d++;s[t1].pts++;s[t2].pts++;p1=1;p2=1;}
    const k=key(t1,t2);
    if(!h2h[k])h2h[k]={};
    const inv=t1>t2;
    h2h[k].pts1=(h2h[k].pts1||0)+(inv?p2:p1);
    h2h[k].pts2=(h2h[k].pts2||0)+(inv?p1:p2);
    h2h[k].gf1=(h2h[k].gf1||0)+(inv?g2:g1);
    h2h[k].gf2=(h2h[k].gf2||0)+(inv?g1:g2);
  }
  teams.forEach(t=>{s[t].gd=s[t].gf-s[t].ga;});

  function h2hFor(a,b){
    const k=key(a,b),r=h2h[k]; if(!r)return null;
    const inv=a>b;
    return{pts_a:inv?r.pts2:r.pts1,pts_b:inv?r.pts1:r.pts2,gf_a:inv?r.gf2:r.gf1,gf_b:inv?r.gf1:r.gf2};
  }

  return Object.entries(s).map(([name,st])=>({name,...st})).sort((a,b)=>{
    if(a.pts!==b.pts)return b.pts-a.pts;
    // 1. H2H-Punkte
    const hh=h2hFor(a.name,b.name);
    if(hh){
      const dp=hh.pts_a-hh.pts_b; if(dp!==0)return -dp;
      // 2. H2H-Tordifferenz
      const dg=(hh.gf_a-hh.gf_b)-(hh.gf_b-hh.gf_a); if(dg!==0)return -Math.sign(dg);
      // 3. H2H-Tore
      if(hh.gf_a!==hh.gf_b)return hh.gf_b-hh.gf_a;
    }
    // 4. Gesamt-Tordifferenz
    if(a.gd!==b.gd)return b.gd-a.gd;
    // 5. Gesamt-Tore
    if(a.gf!==b.gf)return b.gf-a.gf;
    return a.name.localeCompare(b.name);
  });
}

function teamsSetSort(col){
  if(teamsSort.col===col) teamsSort.dir*=-1;
  else { teamsSort.col=col; teamsSort.dir = col==='caps'?-1:1; teamsSort.dir = col==='caps'?-1:1; }
  renderGruppeKader();
}

    return `<span style="color:#aaa;margin-left:2px">${sd>0?'↑':'↓'}</span>`;
  }

    const byPos={};
    for(const p of raw){ const k=posOrd[p.pos]??9; (byPos[k]||(byPos[k]=[])).push(p); }
    const result=[];
    for(const k of Object.keys(byPos).sort((a,b)=>a-b)){
      byPos[k].sort((a,b)=>{
        if(sc==='name'){ const va=a.name.toLowerCase(),vb=b.name.toLowerCase(); return sd*(va<vb?-1:va>vb?1:0); }
        if(sc==='age') return sd*(a.jg-b.jg);
        if(sc==='club'){ const va=(a.club||'').toLowerCase(),vb=(b.club||'').toLowerCase(); return sd*(va<vb?-1:va>vb?1:0); }
        return sd*(b.caps-a.caps);
      });

    }
    return result;
  }

    const csvName = TEAM_CSV_NAME[teamName] || teamName;
    const players = sortedPlayers(WM_KADER_DATA[csvName]||[]);

      <div style="font-size:11px;font-weight:bold;color:#fff;margin-bottom:2px">${teamName}</div>

      <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid #111">
        <span onclick="teamsSetSort('name')" style="cursor:pointer;user-select:none;color:${sc==='name'?'#bbb':'#555'}">Name ${arrow('name')}</span>
        <span onclick="teamsSetSort('club')" style="cursor:pointer;user-select:none;color:${sc==='club'?'#bbb':'#555'}">Verein ${arrow('club')}</span>
        <span style="display:flex;gap:6px">
          <span onclick="teamsSetSort('age')" style="cursor:pointer;user-select:none;color:${sc==='age'?'#bbb':'#555'}">Alter ${arrow('age')}</span>
          <span onclick="teamsSetSort('caps')" style="cursor:pointer;user-select:none;color:${sc==='caps'?'#bbb':'#555'}">LS ${arrow('caps')}</span>
        </span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:10px">
        <colgroup><col style="width:auto"><col style="width:auto"><col style="width:22px"><col style="width:22px"></colgroup>`;
    let lastPos=null;
    for(const p of players){
      if(p.pos!==lastPos){
        html+=`<tr><td colspan="4" style="color:${posCol[p.pos]||'#888'};font-size:9px;font-weight:bold;padding:5px 0 2px;text-transform:uppercase;letter-spacing:.4px">${posLbl[p.pos]||p.pos}</td></tr>`;
        lastPos=p.pos;
      }
      html+=`<tr>
        <td style="color:#fff;padding:1px 4px 1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</td>
        <td style="color:#fff;padding:1px 4px 1px 0;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.club}${p.land?' ('+p.land+')':''}</td>
        <td style="color:#fff;text-align:right;font-size:9px;padding-right:4px">${year-p.jg}</td>
        <td style="color:#fff;text-align:right;font-size:9px">${p.caps}</td>
      </tr>`;
    }
    if(!players.length) html+=`<tr><td colspan="4" style="color:#aaa;font-size:10px">–</td></tr>`;
    html+=`</table></div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function renderFinalspiele(){
  const el=document.getElementById('gruppe-kader');
  if(!el) return;
  const U=42, CH=36;
  const CW=[138,125,120,112,110];
  const XS=[0,156,299,437,567];
  const H=16*U;
  const SVGW=XS[4]+CW[4];
  const roundKeys=['r32','r16','qf','sf','f'];
  const rounds=[WM_FINAL.r32,WM_FINAL.r16,WM_FINAL.qf,WM_FINAL.sf,WM_FINAL.f];
  const rnames=['Sechzehntelfinale','Achtelfinale','Viertelfinale','Halbfinale','Finale'];
  const cys=[
    rounds[0].map((_,i)=>(i+.5)*U),
    rounds[1].map((_,i)=>(2*i+1)*U),
    rounds[2].map((_,i)=>(4*i+2)*U),
    rounds[3].map((_,i)=>(8*i+4)*U),
    [8*U],
  ];
  const liveData=(typeof WM_FINALS_DATA!=='undefined')?WM_FINALS_DATA:{};

  // Platzhalter-Namen erkennen ("3. A/B/C/D/F", "1. I", "Sieger ...", "Gew. ...")
  function isPlaceholder(t){
    if(!t) return true;
    return /^\d+\.\s+[A-L\/]+$/.test(t) ||   // "1. I", "3. A/B/C/D/F"
           /^Sieger\s/i.test(t) ||              // "Sieger Sechzehntelfinal 3"
           /^Gew\.\s/i.test(t);                 // "Gew. Dallas"
  }
  // Gibt den bereinigten Teamnamen zurück (Emoji behalten, Platzhalter → '')
  function cleanTeam(t){
    if(isPlaceholder(t)) return '';
    return t;
  }

  let svg='';
  for(let r=0;r<4;r++){
    const xR=XS[r]+CW[r],xM=xR+8,xN=XS[r+1];
    for(let i=0;i<rounds[r+1].length;i++){
      const y1=cys[r][2*i],y2=cys[r][2*i+1],ym=(y1+y2)/2;
      svg+=`<polyline points="${xR},${y1} ${xM},${y1} ${xM},${y2} ${xR},${y2}" fill="none" stroke="#ffffff" stroke-width="1"/>`;
      svg+=`<line x1="${xM}" y1="${ym}" x2="${xN}" y2="${ym}" stroke="#ffffff" stroke-width="1"/>`;
    }
  }
  const FLAGS=WM_FLAGS;

  let cards='';
  for(let r=0;r<5;r++){
    const x=XS[r],w=CW[r],rkey=roundKeys[r];
    const bdr=r===4?'#c8a820':r===3?'#4a8a6a':r===2?'#3a7070':'#4a6a9a';
    const tCol=r===4?'#ffd700':r>=2?'#b8d8d0':'#ddd';
    const fSize=r===4?10:9;
    for(let i=0;i<rounds[r].length;i++){
      const m=rounds[r][i];
      const live=(liveData[rkey]&&liveData[rkey][i])||null;
      const rawT1=live?live.t1:m.t1;
      const rawT2=live?live.t2:m.t2;
      const t1=cleanTeam(rawT1)||(isPlaceholder(m.t1)?'':m.t1)||'';
      const t2=cleanTeam(rawT2)||(isPlaceholder(m.t2)?'':m.t2)||'';
      const res=live&&live.r?live.r:'';
      const f1=FLAGS[t1]?FLAGS[t1]+' ':'';
      const f2=FLAGS[t2]?FLAGS[t2]+' ':'';
      const top=Math.round(cys[r][i]-CH/2)+28;
      cards+=`<div style="position:absolute;left:${x}px;top:${top}px;width:${w}px;background:#0d1b2a;border:1px solid ${bdr};border-radius:3px;padding:2px 4px;box-sizing:border-box;font-size:${fSize}px">`+
        `<div style="color:#fff;font-size:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px">${(live&&live.d?live.d:m.d)} · ${m.o}</div>`+
        `<div style="display:flex;align-items:center;gap:3px">`+
          `<div style="flex:1;min-width:0">`+
            `<div style="color:${t1?tCol:'#3a5a6a'};padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:${t1?'normal':'italic'}${r===0&&t1?';cursor:pointer;text-decoration:underline dotted':''}" ${r===0&&t1?`onmouseenter="showTeamPopup('${t1.replace(/'/g,"\\'")}',event)" onmouseleave="hideTeamPopup()" onclick="openTeamGroup('${t1.replace(/'/g,"\\'")}')"`:''} title="${r===0&&t1?'Hover: Gruppe & Kader | Klick: Tab öffnen':''}">${f1}${t1||'wird ermittelt'}</div>`+
            `<div style="color:${t2?tCol:'#3a5a6a'};padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:${t2?'normal':'italic'}${r===0&&t2?';cursor:pointer;text-decoration:underline dotted':''}" ${r===0&&t2?`onmouseenter="showTeamPopup('${t2.replace(/'/g,"\\'")}',event)" onmouseleave="hideTeamPopup()" onclick="openTeamGroup('${t2.replace(/'/g,"\\'")}')"`:''} title="${r===0&&t2?'Hover: Gruppe & Kader | Klick: Tab öffnen':''}">${f2}${t2||'wird ermittelt'}</div>`+
          `</div>`+
          (res?`<div style="color:#fff;font-size:${fSize}px;flex-shrink:0;font-weight:bold">${res}</div>`:'')+
        `</div>`+
        `</div>`;
    }
  }
  let hdrs='';
  for(let r=0;r<5;r++){
    hdrs+=`<div style="position:absolute;left:${XS[r]}px;width:${CW[r]}px;top:4px;text-align:center;font-size:7.5px;font-weight:bold;color:#3a6a7a;letter-spacing:.6px;text-transform:uppercase">${rnames[r]}</div>`;
  }
  // Resultate-Tabelle: alle Spiele nach Datum sortiert
  const allGames=[];
  for(let r=0;r<5;r++){
    for(let i=0;i<rounds[r].length;i++){
      const m=rounds[r][i]; if(!m) continue;
      const live=(liveData[roundKeys[r]]&&liveData[roundKeys[r]][i])||null;
      const t1=cleanTeam(live?live.t1:m.t1)||(isPlaceholder(m.t1)?'':m.t1)||'';
      const t2=cleanTeam(live?live.t2:m.t2)||(isPlaceholder(m.t2)?'':m.t2)||'';
      const res=(live&&live.r)?live.r:'';
      const lh=(live&&live.h)?live.h:'';
      const ld=(live&&live.d)?live.d:m.d||'';
      if(t1||t2) allGames.push({d:ld,h:lh,t1,t2,res,round:rnames[r]});
    }
  }
  function dateKey(d){
    if(!d) return 99999;
    const m=d.match(/(\d{2})\.(\d{2})/);
    return m ? parseInt(m[2])*100+parseInt(m[1]) : 99999; // MMDD
  }
  function timeKey(h){ if(!h) return 9999; const p=h.split(':'); return parseInt(p[0]||0)*100+parseInt(p[1]||0); }
  allGames.sort((a,b)=>{
    const dk=dateKey(a.d)-dateKey(b.d);
    if(dk!==0) return dk;
    return timeKey(a.h)-timeKey(b.h);
  });
  const tblRows=allGames.map(g=>{
    const f1=FLAGS[g.t1]?FLAGS[g.t1]+' ':'';
    const f2=FLAGS[g.t2]?FLAGS[g.t2]+' ':'';
    const resTd=g.res
      ?'<td style="text-align:center;color:#fff;font-weight:bold;padding:2px 5px;white-space:nowrap">'+g.res+'</td>'
      :'<td style="text-align:center;color:#444;padding:2px 5px">–</td>';
    function mkTd(t,f){
      if(!t) return '<td style="padding:2px 4px;white-space:nowrap;color:#555">'+f+'offen</td>';
      const esc=t.replace(/'/g,"\'");
      return '<td style="padding:2px 4px;white-space:nowrap;color:#ccc;cursor:pointer;text-decoration:underline dotted"'+
        ' onmouseenter="showTeamPopup(\'' +esc+ '\',event)"'+
        ' onmouseleave="hideTeamPopup()"'+
        ' onclick="openTeamGroup(\'' +esc+ '\')">'
        +f+t+'</td>';
    }
    const zeit=g.h?'<br><span style="color:#888;font-size:8px">'+g.h+'</span>':'';
    const dateTd='<td style="color:#ccc;font-size:9px;padding:2px 5px;white-space:nowrap">'+g.d+zeit+'</td>';
    return '<tr>'+dateTd+mkTd(g.t1,f1)+resTd+mkTd(g.t2,f2)+'</tr>';
  }).join('');
  const gameTable=`<div style="flex-shrink:0;min-width:240px">
    <div style="font-size:8px;font-weight:bold;color:#3a6a7a;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">Alle Spiele</div>
    <table style="border-collapse:collapse;font-size:9px;width:100%">
      <thead><tr>
        <th style="text-align:left;color:#556;padding:2px 5px;border-bottom:1px solid #2a2a4a">Datum / Zeit</th>
        <th style="text-align:left;color:#556;padding:2px 4px;border-bottom:1px solid #2a2a4a">Team 1</th>
        <th style="text-align:center;color:#556;padding:2px 5px;border-bottom:1px solid #2a2a4a">Res.</th>
        <th style="text-align:left;color:#556;padding:2px 4px;border-bottom:1px solid #2a2a4a">Team 2</th>
      </tr></thead>
      <tbody>${tblRows}</tbody>
    </table>
  </div>`;

  el.innerHTML=`<div style="display:flex;gap:20px;align-items:flex-start;overflow-x:auto;padding:4px 0 12px">` +
    `<div style="position:relative;width:${SVGW}px;height:${H+28}px;flex-shrink:0">`+
      hdrs+
      `<svg width="${SVGW}" height="${H}" style="position:absolute;top:28px;left:0;pointer-events:none">${svg}</svg>`+
      cards+
    `</div>`+
    gameTable+
  `</div>`;
}
